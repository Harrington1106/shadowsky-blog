            <a href="blog.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="file-text"></i><span>笔记</span></a>

    <!-- ═══════ 主内容区 ═══════ -->
    <main class="bm-page">
        <div id="bookmarks-container" class="bm-container animate-fade-in-up">

            <!-- Hero -->
            <section class="bm-hero">
                <h1>网页收藏</h1>
                <p class="bm-hero-desc">精心挑选的各领域优质资源，连接广阔宇宙与数字世界的传送门。</p>
                <div class="bm-hero-stats">
                    <div class="bm-stat-pill">
                        <i data-lucide="bookmark" class="bm-stat-icon"></i>
                        <span class="bm-stat-value" id="bm-total-count">—</span>
                        <span>个书签</span>
                    </div>
                    <div class="bm-stat-pill">
                        <i data-lucide="folder-tree" class="bm-stat-icon"></i>
                        <span class="bm-stat-value" id="bm-cat-count">—</span>
                        <span>个分类</span>
                    </div>
                </div>
            </section>

            <!-- GitHub Bookmarks Config (hidden, for admin overlay) -->
            <div id="gh-bookmarks-config" data-owner="Harrington1106" data-repo="blog-add" class="hidden"></div>

            <!-- Search -->
            <div class="bm-search-wrapper" data-ui-toolbar="bookmarks-search">
                <i data-lucide="search" class="bm-search-icon"></i>
                <input type="text" id="bookmark-search"
                    class="bm-search-input"
                    placeholder="搜索收藏的网站、工具或资源...">
                <kbd class="bm-search-kbd">/</kbd>
            </div>

            <!-- Category Navigation -->
            <div class="bm-cat-bar" data-ui-panel="bookmarks-categories">
                <div id="category-nav" class="bm-cat-nav">
                    <!-- Dynamic categories injected by js/bookmarks.js -->
                </div>
            </div>

            <!-- Category Sections Container -->
            <div id="category-list" class="bm-cat-list"></div>

            <!-- No Results -->
            <div id="no-results" class="bm-no-results hidden">
                <div class="bm-no-results-icon">
                    <i data-lucide="search-x"></i>
                </div>
                <h3>未找到相关结果</h3>
                <p>尝试更换关键词，或者浏览分类寻找灵感。</p>
            </div>

        </div>

    <!-- Back to Top Button -->
    <button id="back-to-top" aria-label="Back to top">

    <!-- Footer -->
    <footer class="site-footer">
        <span class="visit-count"><span class="pulse-dot"></span><span id="visit-count">—</span> 次浏览</span>

        <span>&copy; 2026 Shadow Quake</span>
    </footer>

    <!-- Custom Context Menu -->
    <div id="context-menu" class="bm-context-menu hidden">
        <button onclick="window.location.reload()" class="bm-context-menu-item">
            <i data-lucide="rotate-cw"></i>
            刷新页面
        </button>
        <button id="ctx-back-to-top" class="bm-context-menu-item">
            <i data-lucide="chevron-up"></i>
            回到顶部
        </button>
        <div class="bm-context-menu-divider"></div>
        <button onclick="document.getElementById('bookmark-search').focus()" class="bm-context-menu-item">
            <i data-lucide="search"></i>
            快速搜索
        </button>
        <div class="bm-context-menu-divider"></div>
        <button onclick="window.location.href='index.html'" class="bm-context-menu-item">
            <i data-lucide="house"></i>
            返回首页
        </button>
    </div>

    <!-- Scripts -->
    <script src="js/api.js?v=20260624v5"></script>
    <script src="js/navbar.js?v=20260624v5"></script>
    <script src="js/click-effect.js?v=20260624v5"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script>
        lucide.createIcons();

        // Smooth Scroll (Lenis)
        const lenis = new Lenis({
            duration: 0.5,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -6 * t)),
            direction: 'vertical',
            gestureDirection: 'vertical',
            smooth: true,
            mouseMultiplier: 1,
            smoothTouch: false,
            touchMultiplier: 2,
        });

        let rafId;
        function raf(time) {
            lenis.raf(time);
            rafId = requestAnimationFrame(raf);
        }
        rafId = requestAnimationFrame(raf);

        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                lenis.start();
                cancelAnimationFrame(rafId);
                rafId = requestAnimationFrame(raf);
            }
        });

        // ── Theme: 单图标动态切换（与 blog.html 一致）──
        const themeIconWrap = document.getElementById('theme-icon-wrap');
        function updateThemeUI() {
            const isDark = document.documentElement.classList.contains('dark');
            // Logo 图片
            document.querySelectorAll('img.dark-only').forEach(i => i.style.display = isDark ? '' : 'none');
            document.querySelectorAll('img.light-only').forEach(i => i.style.display = isDark ? 'none' : '');
            // 主题图标 — 重建 <i> 绕过 lucide 状态缓存
            if (themeIconWrap) {
                themeIconWrap.innerHTML = `<i data-lucide="${isDark ? 'sun' : 'moon'}"></i>`;
                if (window.lucide) lucide.createIcons();
            }
            // Meta theme-color
            const meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.content = isDark ? '#0B1120' : '#F5F7FA';
        }
        window.addEventListener('themechange', updateThemeUI);
        updateThemeUI();

        // ── Visit Counter ──
        (function() {
            const el = document.getElementById('visit-count');
            if (!el) return;
            if (window.api && window.api.fetchVisitCount) {
                const tid = setTimeout(() => { if (el.textContent === '—') el.textContent = '—'; }, 3000);
                window.api.fetchVisitCount('bookmarks').then(d => {
                    clearTimeout(tid);
                    el.textContent = d.count;
                }).catch(() => { clearTimeout(tid); });
            }
        })();
    </script>
    <script src="js/back-to-top.js?v=20260624v5"></script>
    <script src="js/bookmarks.js?v=20260624v5"></script>
    <script src="js/bookmarks-admin.js?v=20260624v5"></script>
    <script>
        // ── Custom Context Menu ──
        const contextMenu = document.getElementById('context-menu');

        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const { clientX: mouseX, clientY: mouseY } = e;
            const menuWidth = contextMenu.offsetWidth || 180;
            const menuHeight = contextMenu.offsetHeight || 200;
            const winWidth = window.innerWidth;
            const winHeight = window.innerHeight;

            let posX = mouseX;
            let posY = mouseY;
            if (posX + menuWidth > winWidth) posX = winWidth - menuWidth - 10;
            if (posY + menuHeight > winHeight) posY = winHeight - menuHeight - 10;

            contextMenu.style.left = `${posX}px`;
            contextMenu.style.top = `${posY}px`;
            contextMenu.classList.remove('hidden');
            requestAnimationFrame(() => contextMenu.classList.add('visible'));
        });

        document.addEventListener('click', (e) => {
            if (!contextMenu.contains(e.target)) hideContextMenu();
        });
        lenis.on('scroll', hideContextMenu);

        function hideContextMenu() {
            if (contextMenu.classList.contains('hidden')) return;
            contextMenu.classList.remove('visible');
            setTimeout(() => contextMenu.classList.add('hidden'), 200);
        }
    </script>
    <script src="js/tracker.js?v=20260624v5"></script>
</body>
</html>
