    <!-- 流体配置（内联，避免 file:// 下 ES module CORS 限制） -->
    <script>
	    window.LiquidFluidConfig = (function() {
	      var DARK = ['#14b8a6','#3b82f6','#8b5cf6','#ec4899'];
	      var LIGHT = ['#5eead4','#93c5fd','#c4b5fd','#f9a8d4'];
	      return {
	        getThemePalette: function(t) { return t==='light' ? {theme:'light',colors:LIGHT,dyeAlpha:0.18,bgColor:'#E8ECF1',glowIntensity:0.4} : {theme:'dark',colors:DARK,dyeAlpha:0.85,bgColor:'#060B18',glowIntensity:0.7}; },
	        getSimResolution: function(w) { return w<640 ? {simResolution:0.2,dyeResolution:0.4} : w<1024 ? {simResolution:0.3,dyeResolution:0.6} : {simResolution:0.5,dyeResolution:1.0}; },
	        shouldUseFallback: function(e) { return !e.webglSupported || e.reducedMotion || (typeof window.orientation !== 'undefined'); },
	        pickAutoSplatterColor: function(p,i) { return p.colors[i%p.colors.length]; },
	        hexToRGB: function(h) { return {r:parseInt(h.slice(1,3),16)/255,g:parseInt(h.slice(3,5),16)/255,b:parseInt(h.slice(5,7),16)/255}; }
	      };
	    })();
    </script>
    <script src="js/fluid-bg.js?v=20260624v5"></script>
    <script src="js/typewriter.js?v=20260624v5"></script>
    <script src="js/navbar.js?v=20260626b"></script>
    <script>
        lucide.createIcons();

        // 打字机启动（诗句来自 design spec）
        if (window.LiquidTypewriter) {
            LiquidTypewriter.initTypewriter('.typewriter', [
                '星河欲转千帆舞',
                '心有猛虎，细嗅蔷薇',
                '且将新火试新茶，诗酒趁年华',
                '路漫漫其修远兮，吾将上下而求索',
                '星垂平野阔，月涌大江流'
            ], { typeMs: 60, deleteMs: 30 });
        }

        // 浏览量（API 可用时 count-up，否则显示静态数字）
        (function() {
            var el = document.getElementById('visit-num');
            if (!el) return;
            var fallback = '23,456'; // 离线静态兜底
            if (window.api && window.api.fetchSiteStats) {
                window.api.fetchSiteStats().then(function(s) {
                    var t = Number(s.total) || 0;
                    if (!t) { el.textContent = fallback; return; }
                    var c = 0, step = Math.max(1, Math.ceil(t / 60));
                    (function tick() {
                        c = Math.min(t, c + step);
                        el.textContent = c.toLocaleString();
                        if (c < t) requestAnimationFrame(tick);
                    })();
                }).catch(function() { el.textContent = fallback; });
            } else {
                // 无 API 时显示静态数字
                el.textContent = fallback;
            }
        })();

        // 主题 logo 同步
        var h = document.documentElement;
        function sync() {
            var d = h.classList.contains('dark');
            document.querySelectorAll('img.dark-only').forEach(function(i) { i.style.display = d ? 'inline' : 'none'; });
            document.querySelectorAll('img.light-only').forEach(function(i) { i.style.display = d ? 'none' : 'inline'; });
        }
        window.addEventListener('themechange', sync);
        sync();

        // 右键菜单：暴露主题切换
        window.toggleTheme = function() {
            var btn = document.getElementById('theme-toggle');
            if (btn) btn.click();
        };

        // 右键菜单：背景效果切换
        window.toggleFluidEffect = function() {
            var canvas = document.getElementById('fluid-canvas');
            var fb = document.getElementById('fluid-fallback');
            if (!canvas || !fb) return;
            if (canvas.style.display === 'none') {
                canvas.style.display = 'block';
                fb.style.display = 'none';
            } else {
                canvas.style.display = 'none';
                fb.style.display = 'block';
            }
        };

        // 首页隐藏无用的右键菜单项
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                var menu = document.getElementById('custom-context-menu');
                if (!menu) return;
                var items = menu.querySelectorAll('.ctx-item');
                items.forEach(function(item) {
                    var text = item.textContent.trim();
                    if (text === '回到顶部' || text === '首页') {
                        item.style.display = 'none';
                    }
                });
                // 也隐藏对应的分隔线
                var dividers = menu.querySelectorAll('.ctx-divider');
                // 简单处理：总是显示分隔线
            }, 500);
        });
    </script>
