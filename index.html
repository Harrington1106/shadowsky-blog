    <script type="module" src="js/fluid-config.js"></script>
    <script type="module" src="js/fluid-bg.js"></script>

    <script>lucide.createIcons();</script>
    <script type="module">
        import { initTypewriter } from './js/typewriter.js';
        initTypewriter('.typewriter', [
            '星河欲转千帆舞',
            '心有猛虎，细嗅蔷薇',
            '且将新火试新茶，诗酒趁年华',
            '路漫漫其修远兮，吾将上下而求索',
            '星垂平野阔，月涌大江流'
        ], { typeMs: 60, deleteMs: 30 });

        (async function() {
            const el = document.getElementById('visit-num');
            if (!el) return;
            try {
                let target = 0;
                if (window.api && typeof window.api.fetchSiteStats === 'function') {
                    const stats = await window.api.fetchSiteStats();
                    target = Number(stats.total) || 0;
                } else if (window.api && typeof window.api.fetchVisitCount === 'function') {
                    const result = await window.api.fetchVisitCount('index');
                    target = Number(result.total) || Number(result.count) || 0;
                }
                if (target === 0) { el.textContent = '—'; return; }
                let cur = 0;
                const step = Math.max(1, Math.ceil(target / 60));
                const tick = () => {
                    cur = Math.min(target, cur + step);
                    el.textContent = cur.toLocaleString();
                    if (cur < target) requestAnimationFrame(tick);
                };
                tick();
            } catch (e) { el.textContent = '—'; }
        })();

        const html = document.documentElement;
        function syncLogos() {
            const dark = html.classList.contains('dark');
            document.querySelectorAll('img.dark-only').forEach(i => i.style.display = dark ? 'inline' : 'none');
            document.querySelectorAll('img.light-only').forEach(i => i.style.display = dark ? 'none' : 'inline');
        }
        window.addEventListener('themechange', syncLogos);
        syncLogos();
    </script>
