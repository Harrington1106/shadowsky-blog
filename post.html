    <!-- Main Content -->
    <article>
        <!-- Hero -->
        <header class="post-hero">
            <div id="header-bg" class="post-hero-bg"></div>
            <div class="post-hero-overlay"></div>
            <div class="post-hero-content">
                <a href="blog.html" class="post-hero-back"><i data-lucide="arrow-left"></i> 返回文章列表</a>
                <div class="post-hero-meta" id="post-meta"></div>
                <h1 class="post-hero-title" id="post-title">加载中…</h1>
                <div class="post-hero-tags" id="post-tags"></div>
            </div>
        </header>

        <div class="post-shell">
            <div class="post-body">
                <div class="prose" id="post-content">
                    <div style="text-align:center;padding:60px 0">
                        <div class="rs-spinner"></div>
                    </div>
                </div>
                <div class="post-back"><a href="blog.html"><i data-lucide="arrow-left"></i> 返回文章列表</a></div>
            </div>

            <aside class="post-sidebar">
                <div class="post-toc-card">
                    <h3><i data-lucide="list"></i> 目录</h3>
                    <nav id="toc-desktop" class="post-toc-nav custom-scrollbar"></nav>
                </div>
                <div id="recommendations-container-desktop" class="post-reco-card hidden">
                    <h3><i data-lucide="file-text"></i> 相关推荐</h3>
                    <div id="recommendations-list-desktop"></div>
                </div>
            </aside>
        </div>

        <!-- Mobile TOC -->
        <button id="toc-toggle" style="position:fixed;right:20px;bottom:100px;z-index:40;width:44px;height:44px;border-radius:50%;background:var(--rs-card-bg);border:1px solid var(--rs-card-border);backdrop-filter:blur(12px);color:var(--rs-text-body);cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.1)">
            <i data-lucide="list"></i>
        </button>
        <div id="toc-drawer" style="position:fixed;top:0;right:0;height:100%;width:300px;max-width:85vw;z-index:50;transform:translateX(100%);transition:transform .3s;display:flex;flex-direction:column;border-left:1px solid var(--rs-card-border)">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--rs-card-border)">
                <h3 style="font-size:.95rem;font-weight:700;color:var(--rs-text-title);display:flex;align-items:center;gap:8px"><i data-lucide="list"></i> 文章目录</h3>
                <button id="toc-close" style="background:none;border:none;color:var(--rs-text-dim);cursor:pointer;padding:4px"><i data-lucide="x"></i></button>
            </div>
            <div style="flex:1;overflow-y:auto;padding:16px 20px" class="custom-scrollbar">
                <nav id="toc-mobile"></nav>
                <div id="recommendations-container-mobile" class="hidden" style="margin-top:24px;padding-top:16px;border-top:1px solid var(--rs-card-border)"><div id="recommendations-list-mobile"></div></div>
            </div>
        </div>
        <div id="toc-overlay" style="position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);display:none;opacity:0;transition:opacity .3s"></div>
    </article>

    <!-- ═══════════ FOOTER ═══════════ -->
<footer class="site-footer"><span class="visit-count"><span class="pulse-dot"></span><span id="visit-count">—</span> 次浏览</span><span class="footer-dot">·</span><span>&copy; 2026 夏日科技探索 — Designed with <span class="footer-heart">❤️</span></span></footer>

    <!-- Back to Top Button -->
    <button id="back-to-top" style="position:fixed;bottom:28px;right:28px;width:44px;height:44px;border-radius:50%;background:var(--rs-accent);color:#fff;border:none;cursor:pointer;z-index:50;opacity:0;transform:translateY(12px);pointer-events:none;transition:all .3s;box-shadow:0 4px 16px var(--rs-accent-glow);display:flex;align-items:center;justify-content:center" aria-label="回到顶部">
        <i data-lucide="chevron-up"></i>
    </button>

    <!-- FOUC prevention -->
    <style>
        html:not(.dark) .dark-only{display:none!important}
        html.dark .light-only{display:none!important}
    </style>

    <!-- Scripts -->
    <script src="js/navbar.js?v=2606250600"></script>

    <script src="js/main.js?v=2606250600"></script>
    <script src="js/post-viewer.js?v=2606251030"></script>
    <script src="js/click-effect.js?v=20260624v5"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="js/context-menu.js?v=2606270200"></script>
    <script>
        // Lenis 平滑滚动
        const lenis = new Lenis({
            duration: 0.5,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -6 * t)),
            smoothTouch: false,
            touchMultiplier: 2,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }

        requestAnimationFrame(raf);
        window.lenis = lenis;

        // BTT — Lenis 驱动，精确可控
        const btt = document.getElementById('back-to-top');
        if (btt) {
            function updateBTT(scroll) {
                btt.style.opacity = scroll > 400 ? '1' : '0';
                btt.style.transform = scroll > 400 ? 'translateY(0)' : 'translateY(12px)';
                btt.style.pointerEvents = scroll > 400 ? 'auto' : 'none';
            }
            lenis.on('scroll', ({ scroll }) => updateBTT(scroll));
            btt.addEventListener('click', () => lenis.scrollTo(0, { duration: 0.8 }));
        }

    </script>
    <script src="js/back-to-top.js?v=20260624v5"></script>
    <script>lucide.createIcons();</script>
