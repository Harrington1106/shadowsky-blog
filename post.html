    <!-- Main Content -->
    <article class="min-h-screen pb-20 relative">
        <!-- Hero Header -->
        <header id="post-header" class="relative w-full h-[50vh] min-h-[400px] flex items-end pb-12 mb-12 bg-gray-900 overflow-hidden group">
            <!-- Background Image Layer -->
            <div id="header-bg" class="absolute inset-0 w-full h-full bg-cover bg-center z-0 transition-transform duration-700 group-hover:scale-105"></div>
            
            <!-- Overlay/Mask Layer -->
            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/50 to-transparent z-10"></div>

            <!-- Content Layer -->
            <div class="relative z-20 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <!-- Back Button -->
                <div class="mb-6">
                    <a href="blog.html" class="inline-flex items-center text-sm font-medium text-white/90 hover:text-white transition-colors bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-full backdrop-blur-sm border border-white/10">
                        <i data-lucide="arrow-left" class="w-4 h-4 mr-1.5"></i>
                        返回文章列表
                    </a>
                </div>

                <!-- Meta -->
                <div class="flex flex-wrap items-center justify-start gap-4 text-sm text-gray-300 mb-4" id="post-meta">
                    <!-- Meta info injected here -->
                </div>

                <!-- Title -->
                <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold font-sans text-white mb-6 leading-tight tracking-tight drop-shadow-lg" id="post-title">
                    加载中…

                <!-- Tags -->

                    <!-- Tags injected here -->
                </div>
            </div>
        </header>

        <div class="public-shell public-shell--floating-nav layout-safe-top px-4 sm:px-6 lg:px-8" data-ui-shell="post-reading">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-12 layout-overflow-guard">
                <!-- Content Column -->
                <div class="lg:col-span-3">

                    <!-- Content -->
                    <div class="reading-surface prose md:prose-lg dark:prose-invert max-w-none rounded-[32px]" id="post-content">
                        <div class="flex justify-center py-20">
                            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                        </div>
                    </div>
                    
                    <!-- Back to Blog -->
                    <div class="mt-16 pt-8 border-t border-gray-100 dark:border-gray-800 text-center lg:text-left">

                </div>

                            </h3>
                            <nav id="toc-desktop" class="max-h-[60vh] overflow-y-auto custom-scrollbar pr-2">
                                <!-- TOC Content -->
                            </nav>
                        </div>

                        <!-- Recommendations Card -->
                        <div id="recommendations-container-desktop" class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-6 hidden" data-ui-group="post-related">

                                <i data-lucide="file-text" class="w-4 h-4 mr-2 text-yellow-500"></i> 相关推荐
                            </h3>
                            <div id="recommendations-list-desktop" class="space-y-4">
                                <!-- Recommendations will be injected here -->
                            </div>
                        </div>
                    </div>
                </aside>
            </div>
        </div>

        <!-- Floating TOC Button (Mobile Only) -->
        <button id="toc-toggle" class="glass-card lg:hidden fixed right-6 bottom-24 z-40 p-3 bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-full shadow-lg border border-gray-200 dark:border-gray-700 hover:text-blue-600 dark:hover:text-blue-400 transition-all duration-300 hover:scale-110 active:scale-95" aria-label="Toggle Table of Contents">

    <script src="js/context-menu.js?v=20260624v5"></script>
    <script>
        // Lenis 平滑滚动
        const lenis = new Lenis({
            duration: 0.5,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -6 * t)),
            smoothTouch: false,
            touchMultiplier: 2,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }

        requestAnimationFrame(raf);
        
        // Make lenis global for context menu usage
        window.lenis = lenis;

    </script>
