    <style>
        /* === Prose/Typography Base Styles (替代 @tailwindcss/typography 插件) === */
        .prose {
            max-width: none;
            color: #1f2937; /* gray-800 */
            font-family: 'Inter', 'Noto Sans SC', sans-serif, 'ZCOOL KuaiLe', cursive;
            font-size: 1rem;
            line-height: 1.75;
            letter-spacing: 0.025em;
        }
        @media (min-width: 640px) {
            .prose { font-size: 1.125rem; }
        }
        .prose p {
            margin-top: 1.25em;
            margin-bottom: 1.25em;
            text-align: justify;
        }
        .prose h1, .prose h2, .prose h3, .prose h4 {
            font-family: 'Inter', 'Noto Sans SC', sans-serif, 'ZCOOL KuaiLe', cursive;
            font-weight: 700;
            letter-spacing: 0.025em;
            margin-top: 2em;
            margin-bottom: 1em;
            line-height: 1.3;
        }
        .prose h1 { font-size: 1.875rem; }
        .prose h2 { font-size: 1.5rem; }
        .prose h3 { font-size: 1.25rem; }
        @media (min-width: 640px) {
            .prose h1 { font-size: 2.5rem; }
            .prose h2 { font-size: 2rem; }
            .prose h3 { font-size: 1.75rem; }
        }
        .prose a {
            color: #2563eb; /* blue-600 */
            text-decoration: none;
            transition: color 0.2s;
        }
        .prose a:hover {
            color: #1e40af; /* blue-800 */
            text-decoration: underline;
        }
        .prose :not(pre) > code {
            color: #db2777; /* pink-600 */
            background-color: #f3f4f6; /* gray-100 */
            padding: 0.25rem 0.4rem;
            border-radius: 0.25rem;
            font-weight: 600;
            font-family: Consolas, Monaco, "Andale Mono", "Ubuntu Mono", monospace;
        }
        .prose :not(pre) > code::before { content: ""; }
        .prose :not(pre) > code::after { content: ""; }
        .prose blockquote {
            font-style: normal;
            border-left: 4px solid #3b82f6; /* blue-500 */
            background-color: #eff6ff; /* blue-50 */
            color: #374151; /* gray-700 */
            padding: 1rem;
            border-radius: 0.5rem;
        }
        .prose img {
            border-radius: 0.5rem;
            margin-top: 1.5em;
            margin-bottom: 1.5em;
        }
        .prose ul, .prose ol {
            padding-left: 1.5em;
            margin-top: 1em;
            margin-bottom: 1em;
        }
        .prose li { margin-top: 0.25em; margin-bottom: 0.25em; }
        .prose hr {
            border: 0;
            border-top: 1px solid #e5e7eb;
            margin: 2em 0;
        }
        .prose strong { color: #111827; font-weight: 600; }
        .prose table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5em 0;
        }
        .prose th, .prose td {
            border: 1px solid #e5e7eb;
            padding: 0.5rem 0.75rem;
            text-align: left;
        }
        .prose th { background-color: #f9fafb; font-weight: 600; }

        /* === Dark Mode Prose/Invert === */
        html.dark .prose {
            color: #e5e7eb; /* gray-200 */
        }
        html.dark .prose a { color: #60a5fa; /* blue-400 */ }
        html.dark .prose a:hover { color: #93c5fd; /* blue-300 */ }
        html.dark .prose h1,
        html.dark .prose h2,
        html.dark .prose h3,
        html.dark .prose h4 { color: #f3f4f6; /* gray-100 */ }
        html.dark .prose strong { color: #ffffff; }
        html.dark .prose :not(pre) > code {
            color: #f472b6; /* pink-400 */
            background-color: #1f2937; /* gray-800 */
        }
        html.dark .prose blockquote {
            color: #d1d5db; /* gray-300 */
            background-color: rgba(30, 41, 59, 0.5);
            border-left-color: #60a5fa; /* blue-400 */
        }
        html.dark .prose hr { border-top-color: #374151; }
        html.dark .prose th, html.dark .prose td { border-color: #374151; }
        html.dark .prose th { background-color: rgba(55, 65, 81, 0.3); }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
        }
        /* Fallback background if JS fails */
        html.dark body {
            background-color: #000000;
            color: #f3f4f6;
        }
        /* Markdown Content Styles */
        .prose pre {
            padding: 0;
            border-radius: 0.5rem;
            margin-top: 1.5em;
            margin-bottom: 1.5em;
            /* Default Light Theme Background */
            background-color: #fafafa;
            color: #383a42;
            border: 1px solid #e5e7eb;
            overflow: hidden;
            position: relative;
        }
        
        /* Dark Mode Override */
        html.dark .prose pre {
            background-color: #1e1e1e !important;
            color: #d4d4d4 !important;
            border-color: #404040;
        }

        /* Code Block Header */
        .code-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1rem;
            background-color: #f3f4f6;
            border-bottom: 1px solid #e5e7eb;
            border-radius: 0.5rem 0.5rem 0 0;
            z-index: 10;
        }
        html.dark .code-header {
            background-color: #2d2d2d;
            border-bottom-color: #404040;
        }
        
        .window-controls {
            display: flex;
            gap: 0.4rem;
        }
        .window-dot {
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 50%;
        }
        .window-dot.red { background-color: #ff5f56; }
        .window-dot.yellow { background-color: #ffbd2e; }
        .window-dot.green { background-color: #27c93f; }

        .lang-label {
            font-size: 0.75rem;
            color: #6b7280;
            font-family: monospace;
            text-transform: uppercase;
        }
        html.dark .lang-label {
            color: #9ca3af;
        }

        /* Force hljs container to be transparent so pre background shows */
        .hljs {
            background: transparent !important;
            padding: 0 !important;
            font-family: 'Consolas', 'Monaco', 'Andale Mono', 'Ubuntu Mono', monospace;
            font-size: 0.9em;
            line-height: 1.6;
            display: block;
            overflow-x: auto;
        }
        
        /* Override Tailwind Typography defaults for code blocks */
        .prose pre {
            padding: 1rem !important;
            padding-top: 3.8rem !important;
        }
        .prose pre code {
            background-color: transparent !important;
            color: inherit !important;
            padding: 0 !important;
            font-weight: inherit !important;
            border-radius: 0 !important;
            display: block;
            padding-left: 0.5rem !important; 
        }
        .hljs {
            padding: 0 !important;
        }
        
        .hljs::-webkit-scrollbar {
            height: 6px;
        }
        .hljs::-webkit-scrollbar-track {
            background: transparent;
        }
        .hljs::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.5);
            border-radius: 3px;
        }
        .hljs::-webkit-scrollbar-thumb:hover {
            background-color: rgba(156, 163, 175, 0.8);
        }
        html.dark .hljs::-webkit-scrollbar-thumb {
            background-color: rgba(75, 85, 99, 0.5);
        }
        html.dark .hljs::-webkit-scrollbar-thumb:hover {
            background-color: rgba(75, 85, 99, 0.8);
        }

        /* TOC Styles */
        html {
            scroll-padding-top: 5rem;
        }
        
        html.lenis, html.lenis body {
            height: auto;
        }
        .lenis.lenis-smooth {
            scroll-behavior: auto !important;
        }
        .lenis.lenis-smooth [data-lenis-prevent] {
            overscroll-behavior: contain;
        }
        .lenis.lenis-stopped {
            overflow: hidden;
        }
        .lenis.lenis-scrolling iframe {
            pointer-events: none;
        }

        .toc-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .toc-sublist {
            list-style: none;
            margin-left: 0;
            overflow: hidden;
            transition: all 0.3s ease-in-out;
        }

        .toc-link {
            display: block;
            padding: 0.5rem 0.75rem;
            color: #6b7280;
            text-decoration: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
            border-left: 3px solid transparent;
            border-radius: 0 0.5rem 0.5rem 0;
            margin-bottom: 4px;
            line-height: 1.5;
        }
        html.dark .toc-link {
            color: #9ca3af;
        }
        
        .toc-link:hover {
            background-color: rgba(243, 244, 246, 0.8);
            color: #111827;
            border-left-color: #d1d5db;
        }
        html.dark .toc-link:hover {
            background-color: rgba(31, 41, 55, 0.6);
            color: #f3f4f6;
            border-left-color: #4b5563;
        }

        .toc-link.active {
            border-left-color: #2563eb;
            background-color: #eff6ff;
            color: #1d4ed8;
            font-weight: 600;
            padding-left: 1rem;
            transform: translateX(2px);
        }
        html.dark .toc-link.active {
            border-left-color: #60a5fa;
            background-color: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        #post-header {
            padding-top: 1rem;
            padding-bottom: 2rem;
            position: relative;
            z-index: 10;
        }

        /* TOC Drawer Styling */
        #toc-drawer {
            backdrop-filter: blur(12px);
            background-color: rgba(255, 255, 255, 0.95);
        }
        html.dark #toc-drawer {
            background-color: rgba(23, 23, 23, 0.95);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.5);
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: rgba(156, 163, 175, 0.8);
        }
        html.dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(75, 85, 99, 0.5);
        }
        html.dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: rgba(75, 85, 99, 0.8);
        }
    </style>
</head>

    <script>
        // Initialize Lenis for smooth scrolling
        const lenis = new Lenis({
            duration: 0.5
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -6 * t)),
            direction: 'vertical',
            gestureDirection: 'vertical',
            smooth: true,
            mouseMultiplier: 1,
            smoothTouch: true,
            touchMultiplier: 2,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }

        requestAnimationFrame(raf);
        
        // Make lenis global for context menu usage
