    <script>
        // Initialize Lenis for smooth scrolling
        const lenis = new Lenis({
            duration: 0.5
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -6 * t)),
            direction: 'vertical',
            gestureDirection: 'vertical',
            smooth: true,
            mouseMultiplier: 1,
            smoothTouch: true,
            touchMultiplier: 2,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }

        requestAnimationFrame(raf);
        
        // Make lenis global for context menu usage
        window.lenis = lenis;
    </script>
