    <!-- MAIN -->

        <div class="mm-container">
            <section class="mm-hero">

            </section>

            <div class="mm-stats" id="mm-stats">

                <div class="mm-stat"><div class="mm-stat-label"><i data-lucide="calendar"></i> 天数</div><div class="mm-stat-num" id="stats-days">0</div></div>
                <div class="mm-stat"><div class="mm-stat-label"><i data-lucide="map-pin"></i> 足迹</div><div class="mm-stat-num" id="stats-locations">0</div></div>
                <div class="mm-stat"><div class="mm-stat-label"><i data-lucide="clock"></i> 最近</div><div class="mm-stat-num mm-stat-num--sm" id="stats-latest">--</div></div>
            </div>

            <div class="mm-charts">
                <div class="mm-chart-box">

                    <div id="activity-container"></div>
                </div>
                <div class="mm-chart-box">
                    <h3><i data-lucide="flame"></i>热力图</h3>

            <div class="mm-toolbar" id="filter-bar">

                    <div class="mm-view">
                        <button id="view-grid" class="mm-view-btn active"><i data-lucide="layout-grid"></i></button>

    <footer class="mm-footer">

    <!-- LIGHTBOX -->

        <div class="lb-top"><button id="lightbox-share"><i data-lucide="share-2"></i></button><button id="lightbox-close"><i data-lucide="x"></i></button></div>
        <div class="lb-main">
            <div class="lb-img-wrap">
                <img id="lightbox-img" src="" alt="">
                <button id="lightbox-prev" class="lb-nav lb-prev"><i data-lucide="chevron-left"></i></button>
                <button id="lightbox-next" class="lb-nav lb-next"><i data-lucide="chevron-right"></i></button>
            </div>
            <div class="lb-info">
                <div class="lb-date"><i data-lucide="calendar"></i><span id="lightbox-date"></span></div>
                <h2 id="lightbox-content"></h2>
                <div id="lightbox-location-container"><i data-lucide="map-pin"></i><span id="lightbox-location"></span></div>
                <div id="lightbox-tags"></div>
                <div id="lightbox-exif">
                    <div class="lb-exif-title"><i data-lucide="camera"></i>Shot Info</div>
                    <div class="lb-exif-grid">
                        <span>Camera</span><span id="exif-camera">--</span>
                        <span>Lens</span><span id="exif-lens">--</span>
                        <span>ISO</span><span id="exif-iso">--</span>
                        <span>Aperture</span><span id="exif-aperture">--</span>

    <script src="js/api.js?v=20260626e"></script>
    <script src="js/main.js?v=20260626e"></script>
    <script src="js/navbar.js?v=20260626e"></script>
    <script src="js/activity_chart.js?v=20260626e"></script>
    <script src="js/heatmap.js?v=20260626e"></script>
    <script src="js/moments.js?v=20260626e"></script>
    <script src="js/click-effect.js?v=20260626e"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="js/context-menu.js?v=20260626e"></script>
    <script>
        lucide.createIcons();
        const lenis = new Lenis({duration:.5,easing:t=>Math.min(1,1.001-Math.pow(2,-6*t)),smooth:true,smoothTouch:false,touchMultiplier:2});
        function raf(time){lenis.raf(time);requestAnimationFrame(raf)}
        requestAnimationFrame(raf);window.lenis=lenis;

        const btt=document.getElementById('back-to-top');
        window.addEventListener('scroll',()=>btt.classList.toggle('visible',window.scrollY>500));
        btt.addEventListener('click',()=>lenis.scrollTo(0));

        // Theme — pure JS, no lucide
        const SUN='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>';
        const MOON='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>';
        // 主题：capturing 拦截点击 → 阻止 navbar.js 冲突 → 手动切换 + 发事件
        const themeBtn=document.getElementById('theme-toggle');
        function applyTheme(isDark){
            var h=document.documentElement;
            if(isDark)h.classList.add('dark');else h.classList.remove('dark');
            localStorage.setItem('theme',isDark?'dark':'light');
            refreshThemeUI();
            window.dispatchEvent(new CustomEvent('themechange'));
        }
        function refreshThemeUI(){
            var d=document.documentElement.classList.contains('dark');
            if(themeBtn)themeBtn.innerHTML=d?SUN:MOON;
            document.querySelectorAll('img.dark-only').forEach(i=>i.style.display=d?'':'none');
            document.querySelectorAll('img.light-only').forEach(i=>i.style.display=d?'none':'');
            var m=document.querySelector('meta[name="theme-color"]');
            if(m)m.content=d?'#0B1120':'#F5F7FA';
        }
        if(themeBtn){
            themeBtn.innerHTML=document.documentElement.classList.contains('dark')?SUN:MOON;
            themeBtn.addEventListener('click',function(e){
                e.stopImmediatePropagation(); // 阻止 navbar.js 的 handler
                applyTheme(!document.documentElement.classList.contains('dark'));
            },true); // capturing phase 先于 navbar.js 的 bubbling
        }
        window.toggleTheme=function(){applyTheme(!document.documentElement.classList.contains('dark'));};
        (function(){var d=document.documentElement.classList.contains('dark');document.querySelectorAll('img.dark-only').forEach(i=>i.style.display=d?'':'none');document.querySelectorAll('img.light-only').forEach(i=>i.style.display=d?'none':'')})();

        // Tags drag scroll
        document.addEventListener('DOMContentLoaded',function(){setTimeout(function(){var r=document.getElementById('tag-filters');if(!r)return;var d=false,sx,sl;r.addEventListener('mousedown',function(e){d=true;sx=e.pageX-r.offsetLeft;sl=r.scrollLeft});r.addEventListener('mouseleave',function(){d=false});r.addEventListener('mouseup',function(){d=false});r.addEventListener('mousemove',function(e){if(!d)return;e.preventDefault();r.scrollLeft=sl-(e.pageX-r.offsetLeft-sx)*1.5})},800)});
    </script>
    <script src="js/back-to-top.js?v=20260626e"></script>
    <script src="js/tracker.js?v=20260626e"></script>
</body>
