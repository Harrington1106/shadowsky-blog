<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>随手拍 — Shadow Quake</title>
    <!-- 阻塞脚本：页面渲染前就切到正确主题，消除闪烁 -->
    <script>
        (function(){
            try {
                var t = localStorage.getItem('theme');
                if (t === 'light') document.documentElement.classList.remove('dark');
                else if (!t && window.matchMedia('(prefers-color-scheme:light)').matches) document.documentElement.classList.remove('dark');
            } catch(e) {}
        })();
    </script>
    <meta name="theme-color" content="#0B1120" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#F5F7FA" media="(prefers-color-scheme: light)">

</head>

    <!-- ═══════ MAIN ═══════ -->
    <main class="mm-page">
        <div class="mm-container">

            <!-- Hero -->
            <section class="mm-hero">
                <h1>生活瞬间</h1>
                <p>用镜头捕捉美好，用一句话记录当下。</p>
            </section>

            <!-- Stats -->
            <div class="mm-stats">
                <div class="mm-stat-card">
                    <div class="mm-stat-label"><i data-lucide="image"></i> 瞬间总数</div>
                    <div class="mm-stat-value" id="stats-count">0</div>
                </div>
                <div class="mm-stat-card">
                    <div class="mm-stat-label"><i data-lucide="calendar"></i> 记录天数</div>
                    <div class="mm-stat-value" id="stats-days">0</div>
                </div>
                <div class="mm-stat-card">
                    <div class="mm-stat-label"><i data-lucide="map-pin"></i> 足迹点</div>
                    <div class="mm-stat-value" id="stats-locations">0</div>
                </div>
                <div class="mm-stat-card">
                    <div class="mm-stat-label"><i data-lucide="clock"></i> 最近更新</div>
                    <div class="mm-stat-value mm-stat--accent" id="stats-latest">--</div>
                </div>
            </div>

            <!-- Charts -->
            <div class="mm-charts">
                <div class="mm-chart-panel">
                    <h3><i data-lucide="activity"></i> 活跃度趋势</h3>
                    <div id="activity-container" style="display:flex;align-items:flex-end;justify-content:center;width:100%;height:90px;padding:0 4px 4px;"></div>
                    <div style="display:flex;justify-content:space-between;padding:0 8px;font-size:.6rem;color:rgba(255,255,255,.2);margin-top:4px;">
                        <span>1年前</span><span>本月</span>
                    </div>
                </div>
                <div class="mm-chart-panel">
                    <h3><i data-lucide="flame"></i> 活跃度热力图 <span style="font-weight:400;font-size:.7rem;opacity:.5;margin-left:6px;">颜色越深越多</span></h3>
                    <div id="heatmap-years" style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;"></div>
                    <div class="mm-heatmap-wrap"><div id="heatmap-container"></div></div>
                    <div class="mm-heatmap-legend">
                        <span>少</span>
                        <div class="mm-legend-bar"></div>
                        <span>多</span>
                    </div>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="mm-toolbar" id="filter-bar">
                <div class="mm-search">
                    <i data-lucide="search" class="mm-search-icon"></i>
                    <input type="text" id="search-input" placeholder="搜索瞬间、标签或地点...">
                </div>
                <div class="mm-tags-row" id="tag-filters"></div>
                <div class="mm-actions">
                    <button id="btn-random" class="mm-action-btn" title="随机漫游"><i data-lucide="shuffle"></i></button>
                    <div class="mm-view-switch">
                        <button id="view-grid" class="mm-view-btn active" title="网格"><i data-lucide="layout-grid"></i></button>
                        <button id="view-timeline" class="mm-view-btn" title="时间轴"><i data-lucide="list"></i></button>
                    </div>
                </div>
            </div>

            <!-- Gallery -->
            <div id="moments-grid" class="mm-gallery">
                <div style="text-align:center;padding:60px 0;grid-column:1/-1;">
                    <div style="width:40px;height:40px;border-radius:50%;border:3px solid rgba(255,255,255,.06);border-top-color:#2dd4bf;animation:spin .8s linear infinite;margin:0 auto 16px;"></div>
                    <p style="font-size:.9rem;color:rgba(255,255,255,.35);">正在加载...</p>
                </div>
            </div>

        </div>

    <!-- ═══════ FOOTER ═══════ -->

            <span id="visit-count">—</span> 次浏览
        </span>
        <span class="footer-dot">·</span>
        <span>&copy; 2026 Shadow Quake</span>
    </footer>

    </button>

    <!-- ═══════ LIGHTBOX ═══════ -->

        <div class="absolute top-6 right-6 flex items-center space-x-4 z-20">
            <button id="lightbox-share" class="mm-lb-btn" title="分享链接"><i data-lucide="share-2" class="w-5 h-5"></i></button>
            <button id="lightbox-close" class="mm-lb-btn" title="关闭"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div class="h-full w-full flex flex-col md:flex-row">
            <div class="flex-1 h-1/2 md:h-full relative flex items-center justify-center p-4">
                <img id="lightbox-img" src="" alt="" class="max-h-full max-w-full object-contain rounded-lg shadow-2xl">
                <button id="lightbox-prev" class="mm-lb-nav mm-lb-nav--prev"><i data-lucide="chevron-left" class="w-7 h-7"></i></button>
                <button id="lightbox-next" class="mm-lb-nav mm-lb-nav--next"><i data-lucide="chevron-right" class="w-7 h-7"></i></button>
            </div>
            <div class="w-full md:w-80 md:border-l p-6 flex flex-col justify-center overflow-y-auto" style="background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);">
                <div class="space-y-5">
                    <div>
                        <div class="flex items-center text-teal-400 mb-2 text-sm font-medium"><i data-lucide="calendar" class="w-4 h-4 mr-2"></i><span id="lightbox-date"></span></div>
                        <h2 id="lightbox-content" class="text-xl md:text-2xl font-serif text-white leading-relaxed"></h2>
                    </div>
                    <div id="lightbox-location-container" class="flex items-center text-gray-400 text-sm hover:text-teal-400 transition-colors cursor-pointer">
                        <i data-lucide="map-pin" class="w-4 h-4 mr-2 text-red-400"></i>
                        <span id="lightbox-location" class="border-b border-dashed border-gray-600 hover:border-teal-400"></span>
                    </div>
                    <div id="lightbox-tags" class="flex flex-wrap gap-2"></div>
                    <div id="lightbox-exif" class="hidden rounded-xl p-4 space-y-3" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);">
                        <div class="flex items-center text-xs text-gray-500 uppercase tracking-wider font-bold mb-2"><i data-lucide="camera" class="w-3 h-3 mr-1.5"></i> Shot Info</div>
                        <div class="grid grid-cols-2 gap-y-3 gap-x-2 text-sm">
                            <div class="text-gray-400">Camera</div><div class="text-white font-mono text-right" id="exif-camera">--</div>
                            <div class="text-gray-400">Lens</div><div class="text-white font-mono text-right" id="exif-lens">--</div>
                            <div class="text-gray-400">ISO</div><div class="text-white font-mono text-right" id="exif-iso">--</div>
                            <div class="text-gray-400">Aperture</div><div class="text-white font-mono text-right" id="exif-aperture">--</div>
                            <div class="text-gray-400">Shutter</div><div class="text-white font-mono text-right" id="exif-shutter">--</div>
                        </div>
                    </div>
                </div>
            </div>

    <!-- ═══════ SCRIPTS ═══════ -->
    <script src="js/api.js?v=20260626a"></script>
    <script src="js/main.js?v=20260626a"></script>
    <script src="js/navbar.js?v=20260626a"></script>
    <script src="js/activity_chart.js?v=20260626a"></script>
    <script src="js/heatmap.js?v=20260626a"></script>
    <script src="js/moments.js?v=20260626a"></script>
    <script src="js/click-effect.js?v=20260626a"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="js/context-menu.js?v=20260626a"></script>
    <script>
        lucide.createIcons();

        // Lenis
        const lenis = new Lenis({
            duration: 0.5,
            easing: t => Math.min(1, 1.001 - Math.pow(2, -6 * t)),
            smooth: true, smoothTouch: false, touchMultiplier: 2,
        });
        function raf(time){lenis.raf(time);requestAnimationFrame(raf)}
        requestAnimationFrame(raf); window.lenis = lenis;

        // Back to top
        const btt = document.getElementById('back-to-top');
        window.addEventListener('scroll', () => btt.classList.toggle('visible', window.scrollY > 500));
        btt.addEventListener('click', () => lenis.scrollTo(0));

        // ═══════ 主题切换 — 纯 JS 无 lucide ═══════
        const SUN = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>';
        const MOON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>';

        const themeBtn = document.getElementById('theme-toggle');
        if (themeBtn) {
            // 替换掉 lucide 生成的 icon-wrapper
            themeBtn.innerHTML = document.documentElement.classList.contains('dark') ? SUN : MOON;
            // 直接 onclick 切换，不依赖 navbar.js 的事件
            themeBtn.onclick = function() {
                const html = document.documentElement;
                const isDark = !html.classList.contains('dark');
                if (isDark) { html.classList.add('dark'); }
                else { html.classList.remove('dark'); }
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                themeBtn.innerHTML = isDark ? SUN : MOON;
                // Logo
                document.querySelectorAll('img.dark-only').forEach(i => i.style.display = isDark ? '' : 'none');
                document.querySelectorAll('img.light-only').forEach(i => i.style.display = isDark ? 'none' : '');
                // Meta
                const meta = document.querySelector('meta[name="theme-color"]');
                if (meta) meta.content = isDark ? '#0B1120' : '#F5F7FA';
                // 通知其他脚本
                window.dispatchEvent(new CustomEvent('themechange'));
            };
        }
        window.toggleTheme = function() { if (themeBtn) themeBtn.onclick(); };

        // 初始 logo 状态
        (function(){
            const d = document.documentElement.classList.contains('dark');
            document.querySelectorAll('img.dark-only').forEach(i => i.style.display = d ? '' : 'none');
            document.querySelectorAll('img.light-only').forEach(i => i.style.display = d ? 'none' : '');
        })();

        // ═══════ Tag 鼠标拖动滚动 ═══════
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const tagRow = document.getElementById('tag-filters');
                if (!tagRow) return;
                let isDown = false, startX, scrollLeft;
                tagRow.addEventListener('mousedown', function(e) {
                    isDown = true; startX = e.pageX - tagRow.offsetLeft; scrollLeft = tagRow.scrollLeft;
                });
                tagRow.addEventListener('mouseleave', function() { isDown = false; });
                tagRow.addEventListener('mouseup', function() { isDown = false; });
                tagRow.addEventListener('mousemove', function(e) {
                    if (!isDown) return;
                    e.preventDefault();
                    const x = e.pageX - tagRow.offsetLeft;
                    tagRow.scrollLeft = scrollLeft - (x - startX) * 1.5;
                });
            }, 800);
        });
    </script>
    <script src="js/back-to-top.js?v=20260626a"></script>
    <script src="js/tracker.js?v=20260626a"></script>
</body>
