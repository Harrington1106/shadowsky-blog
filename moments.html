<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随手拍 — 夏日科技探索</title>
    <script>
        (function(){
            try{var t=localStorage.getItem('theme');if(t==='light')document.documentElement.classList.remove('dark');else if(!t&&matchMedia('(prefers-color-scheme:light)').matches)document.documentElement.classList.remove('dark')}catch(e){}
        })();
    </script>
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" href="public/img/favicon256.png">
    <link rel="preconnect" href="https://fonts.loli.net">
    <link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
    <link href="https://fonts.loli.net/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="css/unified.css?v=2606270700" rel="stylesheet">
    <link href="css/liquid-ambient.css?v=20260626m" rel="stylesheet">
    <link href="css/liquid-moments.css?v=5" rel="stylesheet">
    <script src="js/vendor/lucide.min.js?v=20260626m"></script>
    <style>
        html:not(.dark) .dark-only{display:none!important}
        html.dark .light-only{display:none!important}
    </style>
</head>
<body>

    <!-- Fluid ambient background -->
    <div class="liquid-ambient ambient-gentle" aria-hidden="true">
        <div class="liquid-blob liquid-blob--1"></div>
        <div class="liquid-blob liquid-blob--2"></div>
        <div class="liquid-blob liquid-blob--3"></div>
    </div>

    <!-- NAVBAR (identical to all pages) -->
    <nav id="navbar" class="homepage-cover-nav-shell" data-ui-region="home-nav-shell">
        <div class="nav-inner">
            <div class="nav-left">
                <a href="index.html" class="nav-brand" aria-label="夏日科技探索 Home">
                    <img src="public/img/black256.png" alt="Logo" class="dark-only">
                    <img src="public/img/favicon256.png" alt="Logo" class="light-only">
                    <span>夏日科技探索</span>
                </a>
                <span class="nav-divider" aria-hidden="true"></span>
                <div class="nav-links homepage-cover-nav-actions" role="navigation" aria-label="Main">
                    <a href="index.html" class="nav-link" title="首页"><i data-lucide="house"></i><span class="nav-text">首页</span></a>
                    <a href="blog.html" class="nav-link" title="笔记"><i data-lucide="file-text"></i><span class="nav-text">笔记</span></a>
                    <a href="moments.html" class="nav-link active" aria-current="page" title="片刻"><i data-lucide="camera"></i><span class="nav-text">片刻</span></a>
                    <a href="bookmarks.html" class="nav-link" title="收藏"><i data-lucide="bookmark"></i><span class="nav-text">收藏</span></a>
                    <a href="rss.html" class="nav-link" title="订阅"><i data-lucide="rss"></i><span class="nav-text">订阅</span></a>
                    <a href="acg.html" class="nav-link" title="ACG"><i data-lucide="film"></i><span class="nav-text">ACG</span></a>
                    <a href="about.html" class="nav-link" title="关于"><i data-lucide="user-circle"></i><span class="nav-text">关于</span></a>
                </div>
            </div>
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-toggle" aria-label="切换主题"><span id="theme-icon-wrap"><i data-lucide="sun"></i></span></button>
                <button id="nav-hamburger" class="nav-hamburger" aria-label="菜单" aria-expanded="false"><i data-lucide="menu"></i></button>
            </div>
        </div>
    </nav>
    <div id="mobile-menu" role="dialog" aria-label="导航菜单" aria-modal="true">
        <div class="mobile-menu-header"><span class="mobile-menu-brand">夏日科技探索</span><button class="mobile-menu-close" aria-label="关闭菜单"><i data-lucide="x"></i></button></div>
        <div class="mobile-menu-links">
            <a href="index.html" class="mobile-nav-link"><i data-lucide="house"></i><span>首页</span></a>
            <a href="blog.html" class="mobile-nav-link"><i data-lucide="file-text"></i><span>笔记</span></a>
            <a href="moments.html" class="mobile-nav-link active"><i data-lucide="camera"></i><span>片刻</span></a>
            <a href="bookmarks.html" class="mobile-nav-link"><i data-lucide="bookmark"></i><span>收藏</span></a>
            <a href="rss.html" class="mobile-nav-link"><i data-lucide="rss"></i><span>订阅</span></a>
            <a href="acg.html" class="mobile-nav-link"><i data-lucide="film"></i><span>ACG</span></a>
            <a href="about.html" class="mobile-nav-link"><i data-lucide="user-circle"></i><span>关于</span></a>
        </div>
    </div>

    <!-- ═══════════ MAIN: Gallery starts immediately ═══════════ -->
    <main class="gallery-page">
        <!-- Floating header bar -->
        <div class="gallery-header" id="gallery-header">
            <div class="gallery-header-inner">
                <div class="gallery-stats" id="gallery-stats">
                    <span><strong id="stat-count">0</strong> 张</span>
                    <span class="stat-sep"></span>
                    <span><strong id="stat-days">0</strong> 天</span>
                    <span class="stat-sep"></span>
                    <span><strong id="stat-locs">0</strong> 地</span>
                </div>
                <div class="gallery-search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" id="search-input" placeholder="搜索...">
                </div>
                <div class="gallery-tags" id="tag-filters"></div>
                <div class="gallery-actions">
                    <button class="g-act" id="btn-random" title="随机漫游"><i data-lucide="shuffle"></i></button>
                    <button class="g-act on" id="btn-grid" title="网格"><i data-lucide="layout-grid"></i></button>
                    <button class="g-act" id="btn-timeline" title="时间线"><i data-lucide="list"></i></button>
                </div>
            </div>
        </div>

        <!-- Gallery Grid -->
        <div class="gallery-grid" id="gallery-grid"></div>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
        <span class="visit-count"><span class="pulse-dot"></span><span id="visit-count">--</span> 来过</span>
        <span class="footer-dot">·</span>
        <span>&copy; 2026 夏日科技探索 — Designed with <span class="footer-heart">❤️</span></span>
    </footer>

    <!-- Back to Top -->
    <button class="g-btt" id="back-to-top" aria-label="回到顶部"><i data-lucide="chevron-up"></i></button>

    <!-- ═══════════ LIGHTBOX ═══════════ -->
    <div class="lightbox" id="lightbox">
        <div class="lb-bg-click" id="lb-bg"></div>
        <div class="lb-image-wrap"><img id="lb-img" src="" alt=""></div>
        <button class="lb-close" id="lb-close"><i data-lucide="x"></i></button>
        <button class="lb-share" id="lb-share"><i data-lucide="share-2"></i></button>
        <button class="lb-nav lb-prev" id="lb-prev"><i data-lucide="chevron-left"></i></button>
        <button class="lb-nav lb-next" id="lb-next"><i data-lucide="chevron-right"></i></button>
        <div class="lb-info" id="lb-info">
            <p id="lb-text"></p>
            <div class="lb-info-meta">
                <span id="lb-date"></span>
                <span id="lb-loc-wrap" style="display:none;cursor:pointer"><i data-lucide="map-pin" style="width:12px;height:12px"></i> <span id="lb-loc"></span></span>
            </div>
            <div class="lb-info-tags" id="lb-tags"></div>
            <div class="lb-exif" id="lb-exif"></div>
        </div>
    </div>

    <!-- ═══════════ SCRIPTS ═══════════ -->
    <script src="js/api.js?v=20260626m"></script>
    <script src="js/navbar.js?v=20260626b"></script>
    <script src="js/moments.js?v=5"></script>
    <script src="js/click-effect.js?v=20260626m"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="js/context-menu.js?v=2606270200"></script>
    <script src="js/tracker.js?v=20260626m"></script>
    <script>
        (function(){
            var el=document.getElementById('visit-count');
            if(!el)return;
            var r=0;
            var l=function(){
                if(window.api&&window.api.fetchVisitCount){
                    window.api.fetchVisitCount('moments').then(function(d){if(d&&d.count)el.textContent=d.count}).catch(function(){});
                }else if(r++<20)setTimeout(l,500);
            };
            if(document.readyState==='complete')l();
            else window.addEventListener('load',l);
        })();
    </script>
</body>
</html>
