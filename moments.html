    <!-- Theme FOUC prevention -->
    <script>
        (function(){
            try {
                var t = localStorage.getItem('theme');
                if (t === 'light') document.documentElement.classList.remove('dark');
                else if (!t && matchMedia('(prefers-color-scheme: light)').matches) document.documentElement.classList.remove('dark');
            } catch(e) {}
        })();
    </script>

    <!-- ═══════════ MAIN ═══════════ -->
    <main class="mm-page">
        <div class="mm-shell">

            <!-- Hero -->
            <section class="mm-hero">
                <h1>随手拍</h1>
                <p>用镜头捕捉生活的光与影，记录每一个值得铭记的瞬间</p>
            </section>

            <!-- Stats -->
            <div class="mm-stats" id="mm-stats">
                <div class="mm-stat">
                    <span class="mm-stat-label"><i data-lucide="image"></i> 瞬间</span>
                    <span class="mm-stat-value" id="stat-count">0</span>
                </div>
                <div class="mm-stat">
                    <span class="mm-stat-label"><i data-lucide="calendar-days"></i> 天数</span>
                    <span class="mm-stat-value" id="stat-days">0</span>
                </div>
                <div class="mm-stat">
                    <span class="mm-stat-label"><i data-lucide="map-pin"></i> 足迹</span>
                    <span class="mm-stat-value" id="stat-locations">0</span>
                </div>
                <div class="mm-stat">
                    <span class="mm-stat-label"><i data-lucide="clock"></i> 最近</span>
                    <span class="mm-stat-value mm-stat-value--sm" id="stat-latest">--</span>
                </div>
            </div>

            <!-- Charts -->
            <div class="mm-charts">
                <div class="mm-chart-box">
                    <h3><i data-lucide="activity"></i> 活动</h3>
                    <div class="mm-sparkline" id="activity-container"></div>
                </div>
                <div class="mm-chart-box">
                    <div class="mm-heatmap-header">
                        <h3><i data-lucide="grid-3x3"></i> 热力图</h3>
                        <div class="mm-heatmap-years" id="heatmap-years"></div>
                    </div>
                    <div class="mm-heatmap-wrap"><div id="heatmap-container"></div></div>
                    <div class="mm-heatmap-legend"><span>少</span><div class="mm-legend-bar"></div><span>多</span></div>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="mm-toolbar" id="mm-toolbar">
                <div class="mm-search">
                    <i data-lucide="search"></i>
                    <input type="text" id="search-input" placeholder="搜索瞬间、标签或地点...">
                </div>
                <div class="mm-tags" id="tag-filters"></div>
                <div class="mm-actions">
                    <button class="mm-act-btn" id="btn-random" title="随机漫游"><i data-lucide="shuffle"></i></button>
                    <div class="mm-view-switch">
                        <button class="mm-view-btn active" id="view-grid" title="网格视图"><i data-lucide="layout-grid"></i><span>网格</span></button>
                        <button class="mm-view-btn" id="view-timeline" title="时间线"><i data-lucide="list"></i><span>时间线</span></button>
                    </div>
                </div>
            </div>

            <!-- Gallery Container -->
            <div class="mm-gallery" id="moments-grid"></div>

        </div>

        <span class="footer-dot">·</span>
        <span>&copy; 2026 夏日科技探索 — Designed with <span class="footer-heart">❤️</span></span>

        <div class="lb-top">
            <button id="lightbox-share" title="分享链接"><i data-lucide="share-2"></i></button>
            <button id="lightbox-close" title="关闭"><i data-lucide="x"></i></button>
        </div>
        <div class="lb-stage">
            <div class="lb-image-area">
                <img id="lightbox-img" src="" alt="">
                <button id="lightbox-prev" class="lb-arrow lb-prev" title="上一张"><i data-lucide="chevron-left"></i></button>
                <button id="lightbox-next" class="lb-arrow lb-next" title="下一张"><i data-lucide="chevron-right"></i></button>
            </div>
            <div class="lb-side">
                <div class="lb-card lb-card--main">
                    <div class="lb-meta"><i data-lucide="calendar"></i><span id="lightbox-date"></span></div>
                    <p id="lightbox-content"></p>
                </div>
                <div class="lb-card lb-card--info" id="lightbox-info-card">
                    <div class="lb-location" id="lightbox-location-wrap">
                        <i data-lucide="map-pin"></i><span id="lightbox-location"></span>
                    </div>
                    <div class="lb-tags" id="lightbox-tags"></div>
                </div>
                <div class="lb-card lb-card--exif" id="lightbox-exif">

    <!-- Visit Counter -->
    <script>
        (function() {
            var el = document.getElementById('visit-count');
            if (!el) return;
            var retry = 0;
            var load = function() {
                if (window.api && window.api.fetchVisitCount) {
                    window.api.fetchVisitCount('moments').then(function(d) {
                        if (d && d.count) el.textContent = d.count;
                    }).catch(function() {});
                } else if (retry++ < 20) {
                    setTimeout(load, 500);
                }
            };
            if (document.readyState === 'complete') load();
            else window.addEventListener('load', load);
        })();
    </script>
