    <!-- ═══════ 移动端标签切换 ═══════ -->
    <script>
    (function() {
        const tabs = document.querySelectorAll('.rs-mobile-tab');
        const panels = {
            'rss-sidebar': document.getElementById('rss-sidebar'),
            'rss-inbox': document.getElementById('rss-inbox'),
            'rss-reader': document.getElementById('rss-reader')
        };

        function showPanel(panelName) {
            // 隐藏所有面板
            Object.values(panels).forEach(p => {
                if (p) p.classList.add('rs-panel-hidden');
            });
            // 显示目标面板
            const target = panels[panelName];
            if (target) {
                target.classList.remove('rs-panel-hidden');
                if (panelName === 'rss-reader') {
                    target.classList.add('rs-reader--open');
                } else {
                    target.classList.remove('rs-reader--open');
                }
            }
            // 更新标签状态
            tabs.forEach(t => {
                t.classList.toggle('rs-mobile-tab--active', t.dataset.panel === panelName);
            });
        }

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                showPanel(tab.dataset.panel);
            });
        });

        // 默认显示订阅源面板（移动端）
        if (window.innerWidth <= 768) {
            showPanel('rss-sidebar');
        }

        // 导出供 RSS JS 使用
        window.rssMobile = {
            showPanel: showPanel,
            showReader: function() {
                showPanel('rss-reader');
            }
        };

        // 关闭阅读器（返回列表）
        window.closeReader = function() {
            if (window.innerWidth <= 768) {
                showPanel('rss-inbox');
            }
        };
    })();
    </script>

    <script>
        (function() {
            var el = document.getElementById('visit-count');
            if (!el) return;
            var retry = 0;
            var load = function() {
                if (window.api && window.api.fetchVisitCount) {
                    window.api.fetchVisitCount('rss').then(function(d) {
                        if (d && d.count) el.textContent = d.count;
                    }).catch(function() {});
                } else if (retry++ < 20) {
                    setTimeout(load, 500);
                }
            };
            if (document.readyState === 'complete') load();
            else window.addEventListener('load', load);
        })();
    </script>
