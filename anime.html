            <button data-filter="watching" class="acg-filter">更新中</button>
            <button data-filter="completed" class="acg-filter">已看完</button>
            <button data-filter="plan" class="acg-filter">想看</button>
            <button data-filter="on_hold" class="acg-filter">搁置</button>
            <button data-filter="dropped" class="acg-filter">抛弃</button>
        </div>

        <div id="anime-grid" class="acg-grid"><div class="acg-load"><div class="acg-spin"></div></div></div>

    <footer class="site-footer"><span class="visit-count"><span class="pulse-dot"></span><span id="visit-count">—</span> 来过</span><span class="footer-dot">·</span><span><footer class="site-footer"><span class="visit-count"><span class="pulse-dot"></span><span id="visit-count">—</span> 来过</span><span class="footer-dot">·</span><span>&copy; 2026 夏日科技探索</span></footer>copy; 2026 夏日科技探索 — Designed with <span class="footer-heart">❤️</span></span></footer>

    <script src="js/media-data.js?v=20260624v5"></script>
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="js/context-menu.js?v=2606270200"></script>
    <script>
        lucide.createIcons();
        document.addEventListener('DOMContentLoaded', () => { new MediaLoader('anime', 'anime-grid', { filterContainerId: 'anime-filters' }); });
        const lenis = new Lenis({ duration: 0.5, easing: t => Math.min(1, 1.001 - Math.pow(2, -6 * t)), smoothTouch: false, touchMultiplier: 2 });
        window.lenis = lenis;
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
    </script>
    <script src="js/tracker.js?v=20260624v5"></script>

    <script>
        (function() {
            var el = document.getElementById('visit-count');
            if (!el) return;
            var retry = 0;
            var load = function() {
                if (window.api && window.api.fetchVisitCount) {
                    window.api.fetchVisitCount('anime').then(function(d) {
                        if (d && d.count) el.textContent = d.count;
                    }).catch(function() {});
                } else if (retry++ < 20) {
                    setTimeout(load, 500);
                }
            };
            if (document.readyState === 'complete') load();
            else window.addEventListener('load', load);
        })();
    </script>
