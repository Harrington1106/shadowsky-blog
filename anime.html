<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <meta name="theme-color" content="#0B1120" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#F5F7FA" media="(prefers-color-scheme: light)">
    <title>我的追番 - Shadow Quake</title>
    <link rel="icon" type="image/png" href="public/img/favicon256.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.loli.net">
    <link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
    <link href="https://fonts.loli.net/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">

    <!-- Design System -->
    <script src="https://cdn.tailwindcss.com"></script>
        <link href="css/unified.css?v=20260624v4" rel="stylesheet">
    <link href="css/liquid-ambient.css?v=20260624v4" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="js/vendor/lucide.min.js?v=20260624v4"></script>

    <style>
        :root {
            --acg-pink: #ec4899;
            --acg-violet: #8b5cf6;
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--sp-4);
        }
        @media (min-width: 640px) { .media-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 768px) { .media-grid { grid-template-columns: repeat(4, 1fr); gap: var(--sp-6); } }
        @media (min-width: 1024px) { .media-grid { grid-template-columns: repeat(6, 1fr); } }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: var(--sp-3);
            padding: var(--sp-5);
            margin-bottom: var(--sp-8);
        }
        .filter-btn {
            padding: var(--sp-2) var(--sp-4);
            border-radius: var(--radius-full);
            font-size: var(--text-sm);
            font-weight: var(--weight-medium);
            background: var(--color-surface-raised);
            color: var(--color-text-secondary);
            border: 1px solid var(--color-border);
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out);
        }
        .filter-btn:hover {
            background: var(--color-primary-subtle);
            color: var(--color-primary);
        }
        .filter-btn.active {
            background: var(--acg-pink);
            color: #fff;
            border-color: var(--acg-pink);
            box-shadow: 0 2px 8px rgba(236,72,153,0.3);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="font-sans">
    <!-- ═══════ 流体光斑层 ═══════ -->
    <div class="liquid-ambient ambient-subtle" aria-hidden="true">
        <div class="liquid-blob liquid-blob--1"></div>
        <div class="liquid-blob liquid-blob--2"></div>
        <div class="liquid-blob liquid-blob--3"></div>
    </div>


    <!-- ═══════════ NAVBAR ═══════════ -->
    <nav id="navbar" class="homepage-cover-nav-shell" data-ui-region="home-nav-shell">
        <div class="nav-inner">
            <div class="nav-left">
                <a href="index.html" class="nav-brand" aria-label="Shadow Quake Home">
                    <img src="public/img/black256.png" alt="Logo" class="dark-only">
                    <img src="public/img/favicon256.png" alt="Logo" class="light-only">
                    <span>Shadow Quake</span>
                </a>
                <span class="nav-divider" aria-hidden="true"></span>
                <div class="nav-links homepage-cover-nav-actions" role="navigation" aria-label="Main">
                    <a href="index.html" class="nav-link" title="首页"><i data-lucide="house"></i><span class="nav-text">首页</span></a>
                    <a href="blog.html" class="nav-link" title="笔记"><i data-lucide="file-text"></i><span class="nav-text">笔记</span></a>
                    <a href="moments.html" class="nav-link" title="片刻"><i data-lucide="camera"></i><span class="nav-text">片刻</span></a>
                    <a href="bookmarks.html" class="nav-link" title="收藏"><i data-lucide="bookmark"></i><span class="nav-text">收藏</span></a>
                    <a href="rss.html" class="nav-link" title="订阅"><i data-lucide="rss"></i><span class="nav-text">订阅</span></a>
                    <a href="acg.html" class="nav-link active" aria-current="page" title="ACG"><i data-lucide="film"></i><span class="nav-text">ACG</span></a>
                    <a href="about.html" class="nav-link" title="关于"><i data-lucide="user-circle"></i><span class="nav-text">关于</span></a>
                </div>
            </div>
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-toggle" aria-label="切换主题">
                    <i data-lucide="sun" class="dark-only"></i>
                    <i data-lucide="moon" class="light-only"></i>
                </button>
                <button id="nav-hamburger" class="nav-hamburger" aria-label="菜单" aria-expanded="false">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- ═══════ 移动端菜单 ═══════ -->
    <div id="mobile-menu" role="dialog" aria-label="导航菜单" aria-modal="true">
        <div class="mobile-menu-header">
            <span class="mobile-menu-brand">Shadow Quake</span>
            <button class="mobile-menu-close" aria-label="关闭菜单">
                <i data-lucide="x"></i>
            </button>
        </div>
        <div class="mobile-menu-links">
            <a href="index.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="house"></i><span>首页</span></a>
            <a href="blog.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="file-text"></i><span>笔记</span></a>
            <a href="moments.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="camera"></i><span>片刻</span></a>
            <a href="bookmarks.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="bookmark"></i><span>收藏</span></a>
            <a href="rss.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="rss"></i><span>订阅</span></a>
            <a href="acg.html" class="mobile-nav-link active homepage-mobile-menu-link"><i data-lucide="film"></i><span>ACG</span></a>
            <a href="about.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="user-circle"></i><span>关于</span></a>
        </div>
    </div>

    <!-- ═══════════ MAIN CONTENT ═══════════ -->
    <main style="padding-top:var(--nav-height);min-height:100dvh;">

        <!-- Subtle blob decorations -->
        <div class="blob" style="width:400px;height:400px;top:-80px;right:-80px;
                    background:radial-gradient(circle,rgba(236,72,153,0.2),transparent 70%);"></div>

        <div class="shell" style="padding-block:var(--sp-10);">

            <!-- Page Header with back link -->
            <div style="display:flex;align-items:center;gap:var(--sp-4);margin-bottom:var(--sp-8);">
                <a href="acg.html" style="color:var(--color-text-muted);transition:color var(--duration-fast) var(--ease-out);" aria-label="返回">
                    <i data-lucide="arrow-left" style="width:24px;height:24px;"></i>
                </a>
                <a href="acg.html" style="color:var(--color-text-muted);transition:color var(--duration-fast) var(--ease-out);text-decoration:none;" onmouseover="this.previousElementSibling.style.color='var(--acg-pink)'" onmouseout="this.previousElementSibling.style.color=''">
                </a>
                <div>
                    <div style="font-size:var(--text-xs);font-weight:var(--weight-medium);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.1em;">
                        Anime Library
                    </div>
                    <h1 style="font-size:clamp(var(--text-2xl),3vw,var(--text-3xl));margin:var(--sp-1) 0 0 0;
                               background:linear-gradient(to right,var(--acg-pink),var(--acg-violet));
                               -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">
                        我的追番
                    </h1>
                </div>
            </div>

            <!-- Filters -->
            <div id="anime-filters" class="filter-bar card card-glass">
                <button data-filter="all" class="filter-btn active">全部</button>
                <button data-filter="watching" class="filter-btn">更新中</button>
                <button data-filter="completed" class="filter-btn">已看完</button>
                <button data-filter="plan" class="filter-btn">想看</button>
                <button data-filter="on_hold" class="filter-btn">搁置</button>
                <button data-filter="dropped" class="filter-btn">抛弃</button>
            </div>

            <!-- Anime Grid -->
            <div id="anime-grid" class="media-grid">
                <div style="grid-column:1/-1;display:flex;justify-content:center;padding:var(--sp-20) 0;">
                    <div style="width:48px;height:48px;border-radius:50%;border:2px solid var(--acg-pink);border-top-color:transparent;animation:spin 0.8s linear infinite;"></div>
                </div>
            </div>

        </div>
    </main>

    <!-- ═══════════ BACK TO TOP ═══════════ -->
    <button id="back-to-top" class="btn btn-primary btn-icon" aria-label="回到顶部"
            style="position:fixed;bottom:var(--sp-8);right:var(--sp-8);opacity:0;transform:translateY(10px);transition:all var(--duration-normal) var(--ease-out);z-index:var(--z-dropdown);">
        <i data-lucide="chevron-up"></i>
    </button>

    <!-- ═══════════ FOOTER ═══════════ -->
    <footer>
        <p>&copy; 2025 Thoi <span style="margin:0 var(--sp-2);color:var(--color-primary);">|</span> Designed with <span style="color:#ef4444;margin:0 var(--sp-1);">❤️</span></p>
        <div style="display:inline-flex;align-items:center;gap:var(--sp-2);padding:var(--sp-1) var(--sp-3);background:var(--color-surface-raised);border-radius:var(--radius-full);font-size:var(--text-xs);font-family:var(--pr-font-mono);border:1px solid var(--color-border);margin-top:var(--sp-2);">
            <span style="width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;"></span>
            <span id="visit-count">加载中…</span>
        </div>
    </footer>

    <!-- Light/dark visibility helpers -->
    <style>
        .dark .light-only { display: none !important; }
        .dark .dark-only { display: inline !important; }
        .light-only { display: inline; }
        .dark-only { display: none; }
        img.light-only, img.dark-only { display: none; }
        .dark img.dark-only { display: inline; }
        img.light-only { display: inline; }
        .dark img.light-only { display: none; }
    </style>

    <!-- Scripts -->
    <script src="js/api.js?v=20260624v4"></script>
    <script src="js/main.js?v=20260624v4"></script>
    <script src="js/click-effect.js?v=20260624v4"></script>
    <script src="js/media-data.js?v=20260624v4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            new MediaLoader('anime', 'anime-grid', { filterContainerId: 'anime-filters' });
        });

        window.lenis = new Lenis({
            duration: 0.5
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -6 * t)),
            direction: 'vertical',
            gestureDirection: 'vertical',
            smooth: true,
            mouseMultiplier: 1,
            smoothTouch: false,
            touchMultiplier: 2,
        });

        let rafId;
        function raf(time) {
            window.lenis.raf(time);
            rafId = requestAnimationFrame(raf);
        }
        rafId = requestAnimationFrame(raf);

        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                window.lenis.start();
                cancelAnimationFrame(rafId);
                rafId = requestAnimationFrame(raf);
            }
        });
    </script>
    <script src="js/back-to-top.js?v=20260624v4"></script>
    <script src="js/context-menu.js?v=20260624v4"></script>
    <script src="js/navbar.js?v=20260624v4"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
