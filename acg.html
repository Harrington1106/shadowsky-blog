<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <meta name="theme-color" content="#0B1120" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#F5F7FA" media="(prefers-color-scheme: light)">
    <title>二次元空间 - Shadow Quake</title>
    <link rel="icon" type="image/png" href="public/img/favicon256.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.loli.net">
    <link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
    <link href="https://fonts.loli.net/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">

    <!-- Design System -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/unified.css" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="js/vendor/lucide.min.js"></script>

    <style>
        /* ACG page accent colors */
        :root {
            --acg-pink: #ec4899;
            --acg-orange: #f97316;
            --acg-red: #ef4444;
            --acg-purple: #8b5cf6;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--sp-8);
        }
        .section-header h2 {
            display: flex;
            align-items: center;
            gap: var(--sp-3);
        }
        .accent-bar {
            width: 8px;
            height: 32px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
        }
        .accent-bar.pink { background: var(--acg-pink); }
        .accent-bar.orange { background: var(--acg-orange); }
        .accent-bar.red { background: var(--acg-red); }
        .accent-bar.purple { background: var(--acg-purple); }

        .view-all {
            font-size: var(--text-sm);
            color: var(--color-text-muted);
            display: flex;
            align-items: center;
            gap: var(--sp-1);
            transition: color var(--duration-fast) var(--ease-out);
        }
        .view-all:hover { color: var(--color-primary); }
        .view-all i { width: 16px; height: 16px; transition: transform var(--duration-fast) var(--ease-out); }
        .view-all:hover i { transform: translateX(4px); }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--sp-4);
        }
        @media (min-width: 640px) { .media-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 768px) { .media-grid { grid-template-columns: repeat(4, 1fr); gap: var(--sp-6); } }
        @media (min-width: 1024px) { .media-grid { grid-template-columns: repeat(6, 1fr); } }

        .video-grid {
            display: grid;
            gap: var(--sp-4);
        }
        @media (min-width: 768px) { .video-grid { grid-template-columns: repeat(2, 1fr); gap: var(--sp-6); } }
        @media (min-width: 1024px) { .video-grid { grid-template-columns: repeat(3, 1fr); gap: var(--sp-8); } }

        .page-title-gradient {
            background: linear-gradient(to right, var(--acg-pink), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="font-sans">

    <!-- ═══════════ NAVBAR ═══════════ -->
    <nav id="navbar" class="homepage-cover-nav-shell" data-ui-region="home-nav-shell">
        <div class="nav-inner">
            <div class="nav-left">
                <a href="index.html" class="nav-brand" aria-label="Shadow Quake Home">
                    <img src="public/img/black256.png" alt="Logo" class="dark-only">
                    <img src="public/img/favicon256.png" alt="Logo" class="light-only">
                    <span>Shadow Quake</span>
                </a>
                <span class="nav-divider" aria-hidden="true"></span>
                <div class="nav-links homepage-cover-nav-actions" role="navigation" aria-label="Main">
                    <a href="index.html" class="nav-link" title="首页"><i data-lucide="house"></i><span class="nav-text">首页</span></a>
                    <a href="blog.html" class="nav-link" title="笔记"><i data-lucide="file-text"></i><span class="nav-text">笔记</span></a>
                    <a href="moments.html" class="nav-link" title="片刻"><i data-lucide="camera"></i><span class="nav-text">片刻</span></a>
                    <a href="bookmarks.html" class="nav-link" title="收藏"><i data-lucide="bookmark"></i><span class="nav-text">收藏</span></a>
                    <a href="rss.html" class="nav-link" title="订阅"><i data-lucide="rss"></i><span class="nav-text">订阅</span></a>
                    <a href="acg.html" class="nav-link active" aria-current="page" title="ACG"><i data-lucide="film"></i><span class="nav-text">ACG</span></a>
                    <a href="about.html" class="nav-link" title="关于"><i data-lucide="user-circle"></i><span class="nav-text">关于</span></a>
                </div>
            </div>
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-toggle" aria-label="切换主题">
                    <i data-lucide="sun" class="dark-only"></i>
                    <i data-lucide="moon" class="light-only"></i>
                </button>
                <button id="nav-hamburger" class="nav-hamburger" aria-label="菜单" aria-expanded="false">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- ═══════ 移动端菜单 ═══════ -->
    <div id="mobile-menu" role="dialog" aria-label="导航菜单" aria-modal="true">
        <div class="mobile-menu-header">
            <span class="mobile-menu-brand">Shadow Quake</span>
            <button class="mobile-menu-close" aria-label="关闭菜单">
                <i data-lucide="x"></i>
            </button>
        </div>
        <div class="mobile-menu-links">
            <a href="index.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="house"></i><span>首页</span></a>
            <a href="blog.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="file-text"></i><span>笔记</span></a>
            <a href="moments.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="camera"></i><span>片刻</span></a>
            <a href="bookmarks.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="bookmark"></i><span>收藏</span></a>
            <a href="rss.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="rss"></i><span>订阅</span></a>
            <a href="acg.html" class="mobile-nav-link active homepage-mobile-menu-link"><i data-lucide="film"></i><span>ACG</span></a>
            <a href="about.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="user-circle"></i><span>关于</span></a>
        </div>
    </div>

    <!-- ═══════════ MAIN CONTENT ═══════════ -->
    <main style="padding-top:var(--nav-height);min-height:100dvh;">

        <!-- Subtle blob decorations -->
        <div class="blob" style="width:500px;height:500px;top:-100px;right:-100px;
                    background:radial-gradient(circle,rgba(236,72,153,0.2),transparent 70%);"></div>
        <div class="blob" style="width:400px;height:400px;bottom:20%;left:-100px;
                    background:radial-gradient(circle,rgba(139,92,246,0.15),transparent 70%);"></div>

        <div class="shell" style="padding-block:var(--sp-10);">

            <!-- Page Header -->
            <div class="card card-glass" style="margin-bottom:var(--sp-12);padding:var(--sp-8);">
                <div style="font-size:var(--text-xs);font-weight:var(--weight-medium);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:var(--sp-2);">
                    ACG Hub
                </div>
                <h1 style="font-size:clamp(var(--text-3xl),5vw,var(--text-5xl));margin-bottom:var(--sp-2);">
                    ACG <span style="color:var(--color-text-primary);">SPACE</span>
                </h1>
                <p style="font-size:var(--text-lg);color:var(--color-text-muted);margin:0;">
                    追番、漫画与我的剪辑作品
                </p>
            </div>

            <!-- Bangumi Anime Collection -->
            <div class="section" style="padding-top:0;">
                <div class="section-header">
                    <h2>
                        <span class="accent-bar pink"></span>
                        我的追番
                    </h2>
                    <a href="anime.html" class="view-all">
                        查看全部 <i data-lucide="chevron-right"></i>
                    </a>
                </div>

                <div id="home-anime-grid" class="media-grid">
                    <div style="grid-column:1/-1;display:flex;justify-content:center;padding:var(--sp-20) 0;">
                        <div style="width:48px;height:48px;border-radius:50%;border:2px solid var(--acg-pink);border-top-color:transparent;animation:spin 0.8s linear infinite;"></div>
                    </div>
                </div>
            </div>

            <!-- Bangumi Manga Collection -->
            <div class="section">
                <div class="section-header">
                    <h2>
                        <span class="accent-bar orange"></span>
                        我的漫画
                    </h2>
                    <a href="manga.html" class="view-all">
                        查看全部 <i data-lucide="chevron-right"></i>
                    </a>
                </div>

                <div id="home-manga-grid" class="media-grid">
                    <div style="grid-column:1/-1;display:flex;justify-content:center;padding:var(--sp-20) 0;">
                        <div style="width:48px;height:48px;border-radius:50%;border:2px solid var(--acg-orange);border-top-color:transparent;animation:spin 0.8s linear infinite;"></div>
                    </div>
                </div>
            </div>

            <!-- Latest Videos Section -->
            <div class="section">
                <div class="section-header">
                    <h2 style="font-size:var(--text-2xl);">
                        <span class="accent-bar red" style="height:24px;"></span>
                        最新发布
                    </h2>
                    <a href="edits.html" class="view-all">
                        查看全部 <i data-lucide="chevron-right"></i>
                    </a>
                </div>

                <div id="video-grid" data-limit="6" class="video-grid">
                    <div style="grid-column:1/-1;display:flex;justify-content:center;padding:var(--sp-20) 0;">
                        <div style="width:48px;height:48px;border-radius:50%;border:2px solid var(--acg-red);border-top-color:transparent;animation:spin 0.8s linear infinite;"></div>
                    </div>
                </div>
            </div>

            <!-- Favorite Videos Section -->
            <div class="section">
                <div class="section-header">
                    <h2>
                        <span class="accent-bar purple"></span>
                        我的收藏视频
                    </h2>
                </div>

                <div id="favorite-video-grid" class="video-grid">
                    <div style="grid-column:1/-1;display:flex;justify-content:center;padding:var(--sp-20) 0;">
                        <div style="width:48px;height:48px;border-radius:50%;border:2px solid var(--acg-purple);border-top-color:transparent;animation:spin 0.8s linear infinite;"></div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- ═══════════ FOOTER ═══════════ -->
    <footer>
        <p>&copy; 2025 Thoi <span style="margin:0 var(--sp-2);color:var(--color-primary);">|</span> Designed with <span style="color:var(--acg-red);margin:0 var(--sp-1);">❤️</span></p>
        <div style="display:inline-flex;align-items:center;gap:var(--sp-2);padding:var(--sp-1) var(--sp-3);background:var(--color-surface-raised);border-radius:var(--radius-full);font-size:var(--text-xs);font-family:var(--pr-font-mono);border:1px solid var(--color-border);margin-top:var(--sp-2);">
            <span style="width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;"></span>
            <span id="visit-count">加载中…</span>
        </div>
    </footer>

    <!-- Light/dark visibility helpers -->
    <style>
        .dark .light-only { display: none !important; }
        .dark .dark-only { display: inline !important; }
        .light-only { display: inline; }
        .dark-only { display: none; }
        img.light-only, img.dark-only { display: none; }
        .dark img.dark-only { display: inline; }
        img.light-only { display: inline; }
        .dark img.light-only { display: none; }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>

    <!-- Scripts -->
    <script src="js/context-menu.js"></script>
    <script src="js/video-loader.js"></script>
    <script src="js/media-data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            new MediaLoader('anime', 'home-anime-grid', { limit: 6 });
            new MediaLoader('manga', 'home-manga-grid', { limit: 6 });
        });
    </script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/click-effect.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script>
        const lenis = new Lenis({
            duration: 0.5
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -6 * t)),
            direction: 'vertical',
            gestureDirection: 'vertical',
            smooth: true,
            mouseMultiplier: 1,
            smoothTouch: false,
            touchMultiplier: 2,
        });
        window.lenis = lenis;

        let rafId;
        function raf(time) {
            lenis.raf(time);
            rafId = requestAnimationFrame(raf);
        }
        rafId = requestAnimationFrame(raf);

        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                lenis.start();
                cancelAnimationFrame(rafId);
                rafId = requestAnimationFrame(raf);
            }
        });
    </script>
    <script src="js/back-to-top.js"></script>
    <script>
        if (window.initContextMenu) {
            window.initContextMenu();
        }
    </script>
    <script src="js/navbar.js"></script>
    <script>
        lucide.createIcons();
    </script>
    <script src="js/tracker.js"></script>
</body>
</html>
