server {
    listen 80;
    listen 443 ssl http2;
    server_name shadowquake.top www.shadowquake.top;

    # 自动升级 HTTP→HTTPS, 修复备案 iframe 等混合内容警告
    add_header Content-Security-Policy "upgrade-insecure-requests" always;

    ssl_certificate     /etc/nginx/cloudflare/shadowquake.top.pem;
    ssl_certificate_key /etc/nginx/cloudflare/shadowquake.top.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /www/wwwroot/47.118.28.27;

    # ===== Static assets: aggressive caching (Cloudflare will cache these) =====
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept-Encoding";
        try_files $uri =404;
    }

    # ===== HTML pages: allow Cloudflare to cache for 4 hours =====
    location ~* \.html$ {
        expires 4h;
        add_header Cache-Control "public, max-age=14400, s-maxage=86400";
        add_header Vary "Accept-Encoding";
        try_files $uri =404;
    }

    # ===== JSON data files =====
    location /public/data/ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # ===== Root/homepage (index.html) =====
    location = / {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, s-maxage=14400";
        add_header Vary "Accept-Encoding";
        try_files /index.html =404;
    }

    # ===== PHP API =====
    location ~ ^/api/.*\.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
    }

    # ===== Node.js backend (admin, API, fallback) =====
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
