        :root {
            --blob-color-1: rgba(168, 85, 247, 0.4);
            --blob-color-2: rgba(253, 224, 71, 0.4);
            --blob-color-3: rgba(244, 114, 182, 0.4);
            --blob-color-4: rgba(34, 211, 238, 0.4);
        }
        .dark {
            --blob-color-1: rgba(147, 51, 234, 0.3);
            --blob-color-2: rgba(37, 99, 235, 0.3);
            --blob-color-3: rgba(79, 70, 229, 0.3);
            --blob-color-4: rgba(13, 148, 136, 0.3);
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
        }

        /* Card hover effects */
        .card-hover {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card-hover:hover {
            transform: translateY(-8px);
        }

        /* Fade in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Staggered animations */
        .animate-fade-in-up {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Blob Animation */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(80px, -100px) scale(1.1); }
            66% { transform: translate(-60px, 80px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 10s infinite ease-in-out;
        }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        .animation-delay-6000 { animation-delay: 6s; }

        /* Star Animation */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
        }
        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: var(--opacity); transform: scale(1); }
            100% { opacity: 0; transform: scale(0.5); }
        }

        /* Gradient text animation */
        @keyframes gradient-x {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animate-gradient-x {
            animation: gradient-x 3s ease infinite;
            background-size: 200% auto;
        }

        /* Pulse glow effect */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
            50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.6); }
        }
        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        /* View button active state */
        .view-btn.active {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        /* Search input focus glow */
        .search-glow:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2), 0 10px 40px rgba(59, 130, 246, 0.15);
        }

        /* Glass morphism effect */
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.7);
        }

        /* Lenis smooth scroll */
        html.lenis, html.lenis body { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
    </style>

    <script>
        // Initialize Lucide icons
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) {
                lucide.createIcons();
            }
        });

        // Particle Network Canvas Animation (from index.html)
        const canvas = document.getElementById('canvas-network');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];

            // Mouse interaction
            let mouse = { x: null, y: null };
            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });
            window.addEventListener('mouseleave', () => {
                mouse.x = null;
                mouse.y = null;
            });

            const particleCount = window.innerWidth < 768 ? 40 : 80;
            const connectionDistance = 150;
            const moveSpeed = 0.6;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * moveSpeed;
                    this.vy = (Math.random() - 0.5) * moveSpeed;
                    this.size = Math.random() * 2 + 1;
                    this.setColors();
                }

                setColors() {
                    const isDark = document.documentElement.classList.contains('dark');
                    if (isDark) {
                        const colors = ['#06b6d4', '#8b5cf6', '#3b82f6'];
                        this.color = colors[Math.floor(Math.random() * colors.length)];
                    } else {
                        const colors = ['#0ea5e9', '#6366f1', '#8b5cf6'];
                        this.color = colors[Math.floor(Math.random() * colors.length)];
                    }
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;

                    // Wall bounce
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;

                    // Mouse Interaction (Repulsion)
                    if (mouse.x != null) {
                        let dx = mouse.x - this.x;
                        let dy = mouse.y - this.y;
                        let distance = Math.sqrt(dx * dx + dy * dy);
                        const forceRadius = 200;

                        if (distance < forceRadius) {
                            const forceDirectionX = dx / distance;
                            const forceDirectionY = dy / distance;
                            const force = (forceRadius - distance) / forceRadius;
                            const directionX = forceDirectionX * force * 2;
                            const directionY = forceDirectionY * force * 2;

                            this.vx -= directionX;
                            this.vy -= directionY;
                        }
                    }

                    // Speed limit
                    const maxSpeed = 3;
                    if (Math.abs(this.vx) > maxSpeed) this.vx *= 0.9;
                    if (Math.abs(this.vy) > maxSpeed) this.vy *= 0.9;
                }

                draw() {
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle());
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                const isDark = document.documentElement.classList.contains('dark');

                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    p.update();
                    p.draw();

                    // Connect particles
                    for (let j = i + 1; j < particles.length; j++) {
                        const p2 = particles[j];
                        const dx = p.x - p2.x;
                        const dy = p.y - p2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < connectionDistance) {
                            if (isDark) {
                                ctx.strokeStyle = `rgba(100, 149, 237, ${0.15 * (1 - dist / connectionDistance)})`;
                            } else {
                                ctx.strokeStyle = `rgba(99, 102, 241, ${0.1 * (1 - dist / connectionDistance)})`;
                            }
                            ctx.lineWidth = 0.6;
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    }
                }
                window.animationId = requestAnimationFrame(animate);
            }

            window.addEventListener('resize', () => {
                resize();
                initParticles();
            });

            // Listen for theme changes
            window.addEventListener('themeChange', () => {
                particles.forEach(p => p.setColors());
            });

            resize();
            initParticles();
            animate();

            // Handle bfcache
            window.addEventListener('pageshow', (event) => {
                if (event.persisted) {
                    cancelAnimationFrame(window.animationId);
                    animate();
                }
            });
        }

        // Initialize Lenis for smooth scrolling
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            direction: 'vertical',
            gestureDirection: 'vertical',
            smooth: true,
            smoothTouch: false,
            touchMultiplier: 2,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);
        window.lenis = lenis;

        // Keyboard shortcut for search
        document.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('search-input')?.focus();
            }
        });
    </script>
    <script src="js/back-to-top.js"></script>
    <script src="js/tracker.js"></script>
</body>
</html>
