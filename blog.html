<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0B1120" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#F5F7FA" media="(prefers-color-scheme: light)">
    <title>星空笔记 — Shadow Quake</title>
    <link rel="icon" type="image/png" href="public/img/favicon256.png">

    <link rel="preconnect" href="https://fonts.loli.net">
    <link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
    <link href="https://fonts.loli.net/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

    <link href="css/unified.css?v=20260626e" rel="stylesheet">
    <link href="css/liquid-ambient.css?v=20260625j" rel="stylesheet">
    <link href="css/liquid-blog.css?v=20260626a" rel="stylesheet">

    <script src="js/vendor/lucide.min.js?v=20260625j"></script>

    <style>
        html:not(.dark) .dark-only{display:none!important}
        html.dark .light-only{display:none!important}
    </style>
</head>
<body class="font-sans">

    <!-- 流体光斑层 -->
    <div class="liquid-ambient ambient-gentle" aria-hidden="true">
        <div class="liquid-blob liquid-blob--1"></div>
        <div class="liquid-blob liquid-blob--2"></div>
        <div class="liquid-blob liquid-blob--3"></div>
        <div class="liquid-blob liquid-blob--4"></div>
    </div>

    <!-- NAVBAR -->
    <nav id="navbar" class="homepage-cover-nav-shell" data-ui-region="home-nav-shell">
        <div class="nav-inner">
            <div class="nav-left">
                <a href="index.html" class="nav-brand" aria-label="Shadow Quake Home">
                    <img src="public/img/black256.png" alt="Logo" class="dark-only">
                    <img src="public/img/favicon256.png" alt="Logo" class="light-only">
                    <span>Shadow Quake</span>
                </a>
                <span class="nav-divider" aria-hidden="true"></span>
                <div class="nav-links homepage-cover-nav-actions" role="navigation" aria-label="Main">
                    <a href="index.html" class="nav-link" title="首页"><i data-lucide="house"></i><span class="nav-text">首页</span></a>
                    <a href="blog.html" class="nav-link active" aria-current="page" title="笔记"><i data-lucide="file-text"></i><span class="nav-text">笔记</span></a>
                    <a href="moments.html" class="nav-link" title="片刻"><i data-lucide="camera"></i><span class="nav-text">片刻</span></a>
                    <a href="bookmarks.html" class="nav-link" title="收藏"><i data-lucide="bookmark"></i><span class="nav-text">收藏</span></a>
                    <a href="rss.html" class="nav-link" title="订阅"><i data-lucide="rss"></i><span class="nav-text">订阅</span></a>
                    <a href="acg.html" class="nav-link" title="ACG"><i data-lucide="film"></i><span class="nav-text">ACG</span></a>
                    <a href="about.html" class="nav-link" title="关于"><i data-lucide="user-circle"></i><span class="nav-text">关于</span></a>
                </div>
            </div>
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-toggle" aria-label="切换主题">
                    <span id="theme-icon-wrap"><i data-lucide="sun"></i></span>
                </button>
                <button id="nav-hamburger" class="nav-hamburger" aria-label="菜单" aria-expanded="false">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- 移动端菜单 -->
    <div id="mobile-menu" role="dialog" aria-label="导航菜单" aria-modal="true">
        <div class="mobile-menu-header">
            <span class="mobile-menu-brand">Shadow Quake</span>
            <button class="mobile-menu-close" aria-label="关闭菜单"><i data-lucide="x"></i></button>
        </div>
        <div class="mobile-menu-links">
            <a href="index.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="house"></i><span>首页</span></a>
            <a href="blog.html" class="mobile-nav-link active homepage-mobile-menu-link"><i data-lucide="file-text"></i><span>笔记</span></a>
            <a href="moments.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="camera"></i><span>片刻</span></a>
            <a href="bookmarks.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="bookmark"></i><span>收藏</span></a>
            <a href="rss.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="rss"></i><span>订阅</span></a>
            <a href="acg.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="film"></i><span>ACG</span></a>
            <a href="about.html" class="mobile-nav-link homepage-mobile-menu-link"><i data-lucide="user-circle"></i><span>关于</span></a>
        </div>
    </div>

    <!-- ═══════ HERO — 全宽沉浸式 ═══════ -->
    <section class="blog-hero">
        <h1 class="fade-in">星空笔记</h1>
        <p class="hero-desc fade-in stagger-1">记录技术、天文与生活的点点滴滴，分享所有有趣的思考与实践</p>
        <div class="blog-hero-stats fade-in stagger-2">
            <div class="blog-stat-pill">
                <i data-lucide="file-text" class="stat-icon"></i>
                <span class="stat-value" id="post-count">—</span>
                <span>篇文章</span>
            </div>
            <div class="blog-stat-pill">
                <i data-lucide="tags" class="stat-icon"></i>
                <span class="stat-value" id="tag-count">—</span>
                <span>个标签</span>
            </div>
            <div class="blog-stat-pill">
                <i data-lucide="folder-tree" class="stat-icon"></i>
                <span class="stat-value" id="category-count">—</span>
                <span>个分类</span>
            </div>
        </div>
    </section>

    <!-- ═══════ TOOLBAR — 搜索 + 视图 ═══════ -->
    <div class="blog-toolbar fade-in stagger-3">
        <div class="search-wrapper">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="search-input" placeholder="搜索笔记...">
            <kbd>⌘K</kbd>
        </div>
        <div class="view-switcher" data-active="0">
            <button class="view-btn active" data-view="grid"><i data-lucide="grid-3x3"></i><span>网格</span></button>
            <button class="view-btn" data-view="timeline"><i data-lucide="clock"></i><span>时间轴</span></button>
            <button class="view-btn" data-view="directory"><i data-lucide="folder-tree"></i><span>目录</span></button>
            <button class="view-btn" data-view="tags"><i data-lucide="tags"></i><span>标签</span></button>
        </div>
    </div>

    <!-- ═══════ 文章容器（JS 动态渲染）═══════ -->
    <div id="posts-container" class="posts-grid fade-in stagger-4">
        <div class="blog-loader">
            <div class="loader-spinner"></div>
            <p class="loader-text">正在加载星空笔记...</p>
        </div>
    </div>

    <!-- Pagination -->
    <div id="pagination-container" style="margin-top:40px;"></div>

    <!-- ═══════ FOOTER ═══════ -->
    <footer class="blog-footer site-footer">
        <span class="visit-count"><span class="pulse-dot"></span><span id="visit-count-text">—</span> 次浏览</span>
        <span class="footer-dot">·</span>
        <span>&copy; 2026 Shadow Quake</span>
    </footer>

    <!-- Back to top -->
    <button id="back-to-top" aria-label="回到顶部">
        <i data-lucide="chevron-up" style="width:22px;height:22px;"></i>
    </button>

    <!-- Scripts -->
    <script src="js/navbar.js?v=20260626b"></script>
    <script src="js/api.js?v=20260625j"></script>
    <script src="js/blog.js?v=20260625j"></script>
    <script src="js/click-effect.js?v=20260625j"></script>
    <script src="js/context-menu.js?v=20260625j"></script>
    <script src="js/tracker.js?v=20260625j"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script>
        lucide.createIcons();

        // Lenis smooth scroll
        const lenis = new Lenis({
            duration: 0.6,
            easing: t => Math.min(1, 1.001 - Math.pow(2, -6 * t)),
            smooth: true, smoothTouch: false, touchMultiplier: 2,
        });
        function raf(time){lenis.raf(time);requestAnimationFrame(raf)}
        requestAnimationFrame(raf);

        // Back to top
        const btt = document.getElementById('back-to-top');
        window.addEventListener('scroll', () => {
            btt.classList.toggle('visible', window.scrollY > 500);
        });
        btt.addEventListener('click', () => { lenis.scrollTo(0); });

        // Search shortcut
        document.addEventListener('keydown', e => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('search-input')?.focus();
            }
        });

        // 右键菜单：暴露主题切换
        window.toggleTheme = function() {
            const btn = document.getElementById('theme-toggle');
            if (btn) btn.click();
        };

        // Theme: 图标动态切换 + Logo 同步
        const htmlEl = document.documentElement;
        const iconWrap = document.getElementById('theme-icon-wrap');

        function updateThemeUI() {
            const isDark = htmlEl.classList.contains('dark');
            // Logo
            document.querySelectorAll('img.dark-only').forEach(i => i.style.display = isDark ? '' : 'none');
            document.querySelectorAll('img.light-only').forEach(i => i.style.display = isDark ? 'none' : '');
            // Theme icon — 重建 <i> + 重渲染，绕过 lucide 状态问题
            if (iconWrap) {
                iconWrap.innerHTML = `<i data-lucide="${isDark ? 'sun' : 'moon'}"></i>`;
                if (window.lucide) lucide.createIcons({ elements: [iconWrap] });
            }
            // Meta theme-color
            const meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.content = isDark ? '#0B1120' : '#F5F7FA';
        }

        window.addEventListener('themechange', updateThemeUI);
        updateThemeUI();

        // Visit counter
        (function() {
            const el = document.getElementById('visit-count-text');
            if (!el || !window.api || !window.api.fetchVisitCount) return;
            window.api.fetchVisitCount('blog').then(d => { el.textContent = d.count; }).catch(() => {});
        })();
    </script>
</body>
</html>
