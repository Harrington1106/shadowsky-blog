<style>
html:not(.dark) .dark-only{display:none!important}
html.dark .light-only{display:none!important}

:root{
    --bg:#0B1120;--s:rgba(255,255,255,.04);--b:rgba(255,255,255,.08);
    --t:#F1F5F9;--soft:rgba(241,245,249,.7);--dim:rgba(241,245,249,.4);
    --a:#2dd4bf;--ab:rgba(45,212,191,.08);
    --h:'Space Grotesk','Noto Sans SC',sans-serif;
    --f:'Inter','Noto Sans SC',sans-serif
}
html:not(.dark){
    --bg:#F8FAFC;--s:#FFF;--b:rgba(0,0,0,.08);
    --t:#0F172A;--soft:rgba(15,23,42,.75);--dim:rgba(15,23,42,.45);
    --a:#0D9488;--ab:rgba(13,148,136,.08)
}
body{font-family:var(--f);background:var(--bg);color:var(--t);padding-top:0}

/* ═══════════ LAYOUT: Sidebar + Main ═══════════ */
.blog-layout{max-width:1040px;margin:0 auto;padding:100px 20px 0;display:flex;gap:40px;align-items:flex-start}
.blog-sidebar{width:220px;flex-shrink:0;position:sticky;top:100px}
.blog-main{flex:1;min-width:0}

/* ══ Sidebar ══ */
.blog-sidebar h2{font-family:var(--h);font-size:1.2rem;font-weight:700;margin:0 0 4px}
.blog-sidebar .subtitle{font-size:.75rem;color:var(--soft);margin:0 0 24px}
.sidebar-stats{display:flex;flex-direction:column;gap:6px;margin-bottom:28px}
.sidebar-stats .stat{font-size:.78rem;color:var(--soft);display:flex;align-items:center;gap:8px}
.sidebar-stats .stat strong{color:var(--t);font-family:var(--h);font-size:.9rem}
.sidebar-section-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin:24px 0 10px}
.sidebar-cats{display:flex;flex-direction:column;gap:2px}
.sidebar-cat{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:8px;border:none;background:transparent;color:var(--soft);font-size:.78rem;cursor:pointer;transition:all .12s;font-family:var(--f);text-align:left}
.sidebar-cat:hover{background:var(--ab);color:var(--a)}
.sidebar-cat.active{background:var(--ab);color:var(--a);font-weight:600}
.sidebar-cat .count{font-size:.65rem;color:var(--dim)}
.sidebar-tags{display:flex;flex-wrap:wrap;gap:5px}
.sidebar-tag{font-size:.65rem;padding:3px 8px;border-radius:6px;border:1px solid var(--b);background:transparent;color:var(--soft);cursor:pointer;transition:all .12s;font-family:var(--f)}
.sidebar-tag:hover{border-color:var(--a);color:var(--a)}

/* ══ Main: Search ══ */
.blog-search{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--b);background:var(--s);color:var(--t);font-size:.85rem;font-family:var(--f);outline:none;margin-bottom:8px;transition:border-color .15s}
.blog-search:focus{border-color:var(--a)}
.blog-search::placeholder{color:var(--dim)}

/* ══ Main: View Tabs ══ */
.blog-tabs{display:flex;gap:0;margin-bottom:28px;border-bottom:2px solid var(--b)}
.blog-tab{padding:10px 20px;border:none;background:transparent;color:var(--soft);font-size:.8rem;cursor:pointer;font-family:var(--f);transition:all .12s;border-bottom:2px solid transparent;margin-bottom:-2px}
.blog-tab:hover{color:var(--t)}
.blog-tab.active{color:var(--a);border-bottom-color:var(--a);font-weight:600}

/* ══ Main: Article List ══ */
.article-list{display:flex;flex-direction:column}
.article-item{display:grid;grid-template-columns:80px 120px 1fr;gap:20px;padding:20px 0;border-bottom:1px solid var(--b);text-decoration:none;color:inherit;transition:all .15s;cursor:pointer;align-items:start}
.article-item:hover{padding-left:8px}
.article-item:hover .article-title{color:var(--a)}
.article-thumb{width:120px;height:80px;border-radius:8px;overflow:hidden;background:rgba(0,0,0,.15)}
.article-thumb img{width:100%;height:100%;object-fit:cover}
.article-thumb--placeholder{display:flex;align-items:center;justify-content:center;background:var(--ab)}
.article-thumb--placeholder i{width:20px;height:20px;opacity:.3;color:var(--a)}
.article-date{font-size:.72rem;color:var(--dim);white-space:nowrap;font-family:var(--h);line-height:1.3;padding-top:2px}
.article-body{flex:1;min-width:0}
.article-title{font-family:var(--h);font-size:.9rem;font-weight:600;line-height:1.4;margin:0 0 4px;transition:color .15s}
.article-excerpt{font-size:.75rem;color:var(--soft);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin:0 0 6px}
.article-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.article-cat{font-size:.62rem;padding:2px 7px;border-radius:4px;background:var(--ab);color:var(--a);font-weight:600}
.article-tag{font-size:.62rem;color:var(--dim)}
.article-readtime{font-size:.65rem;color:var(--dim);margin-left:auto}

.article-item--featured{padding:28px 0}
.article-item--featured .article-title{font-size:1.1rem}
.article-item--featured .article-excerpt{-webkit-line-clamp:3}
@media(max-width:640px){.article-item{grid-template-columns:60px 70px 1fr;gap:10px}.article-thumb{width:70px;height:50px}}

/* ══ AI Daily ══ */
.ai-daily-item{display:flex;align-items:baseline;gap:16px;padding:18px 0;border-bottom:1px solid var(--b);text-decoration:none;color:inherit;transition:all .15s;cursor:pointer}
.ai-daily-item:hover{padding-left:8px}
.ai-daily-item:hover .article-title{color:var(--a)}
.ai-daily-item .ai-badge{display:inline-block;padding:2px 8px;border-radius:4px;background:var(--ab);color:var(--a);font-size:.6rem;font-weight:700;margin-right:8px}

/* ══ Pagination ══ */
.blog-pagination{display:flex;justify-content:center;gap:8px;padding:40px 0 20px}
.blog-pagination button{min-width:38px;height:38px;border-radius:10px;border:1px solid var(--b);background:var(--s);color:var(--soft);cursor:pointer;font-size:.8rem;font-family:var(--f);transition:all .15s}
.blog-pagination button:hover{border-color:var(--a);color:var(--a)}
.blog-pagination button.active{background:var(--a);color:#000;border-color:var(--a);font-weight:700}

/* ══ Empty ══ */
.blog-empty{text-align:center;padding:60px 0;color:var(--soft);font-size:.85rem}

@media(max-width:768px){
    .blog-layout{flex-direction:column;padding:88px 16px 0;gap:20px}
    .blog-sidebar{width:100%;position:static;display:flex;flex-wrap:wrap;gap:16px;align-items:center}
    .blog-sidebar .subtitle{display:none}
    .sidebar-stats{flex-direction:row;gap:16px;margin:0}
    .sidebar-section-title{display:none}
    .sidebar-cats{flex-direction:row;flex-wrap:wrap;gap:4px}
    .sidebar-cat{padding:4px 8px;font-size:.7rem}
    .sidebar-tags{display:none}
    .blog-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .blog-tab{white-space:nowrap;padding:8px 14px;font-size:.75rem}
    .article-date{min-width:60px;font-size:.68rem}
}
</style>

    <!-- Scripts -->
    <script src="js/navbar.js?v=20260626b"></script>
    <script src="js/api.js?v=20260625j"></script>
    <script src="js/blog.js?v=20260629f"></script>
    <script src="js/click-effect.js?v=20260625j"></script>
    <script src="js/context-menu.js?v=2606270200"></script>
    <script src="js/tracker.js?v=20260625j"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script>
        lucide.createIcons();

        // Lenis smooth scroll
        const lenis = new Lenis({
            duration: 0.6,
            easing: t => Math.min(1, 1.001 - Math.pow(2, -6 * t)),
            smooth: true, smoothTouch: false, touchMultiplier: 2,
        });
        function raf(time){lenis.raf(time);requestAnimationFrame(raf)}
        requestAnimationFrame(raf);

        // Back to top
        const btt = document.getElementById('back-to-top');
        window.addEventListener('scroll', () => {
            btt.classList.toggle('visible', window.scrollY > 500);
        });
        btt.addEventListener('click', () => { lenis.scrollTo(0); });

        // Search shortcut
        document.addEventListener('keydown', e => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('search-input')?.focus();
            }
        });

        // 右键菜单：暴露主题切换
        window.toggleTheme = function() {
            const btn = document.getElementById('theme-toggle');
            if (btn) btn.click();
        };

        // Theme: 图标动态切换 + Logo 同步
        const htmlEl = document.documentElement;
        const iconWrap = document.getElementById('theme-icon-wrap');

        function updateThemeUI() {
            const isDark = htmlEl.classList.contains('dark');
            // Logo
            document.querySelectorAll('img.dark-only').forEach(i => i.style.display = isDark ? '' : 'none');
            document.querySelectorAll('img.light-only').forEach(i => i.style.display = isDark ? 'none' : '');
            // Theme icon — 重建 <i> + 重渲染，绕过 lucide 状态问题
            if (iconWrap) {
                iconWrap.innerHTML = `<i data-lucide="${isDark ? 'sun' : 'moon'}"></i>`;
                if (window.lucide) lucide.createIcons({ elements: [iconWrap] });
            }
            // Meta theme-color
            const meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.content = isDark ? '#0B1120' : '#F5F7FA';
        }

        window.addEventListener('themechange', updateThemeUI);
        updateThemeUI();

        // Visit counter
        (function() {
            const el = document.getElementById('visit-count');
            if (!el || !window.api || !window.api.fetchVisitCount) return;
            window.api.fetchVisitCount('blog').then(d => { el.textContent = d.count; }).catch(() => {});
        })();
    </script>
