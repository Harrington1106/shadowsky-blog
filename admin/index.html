    <link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
    <link href="https://fonts.loli.net/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body{font-family:'Inter','Noto Sans SC',sans-serif;background:#060B18;color:#e2e8f0}
        html:not(.dark) body{background:#F1F5F9;color:#0f172a}

        /* ===== 侧边栏 ===== */
        #sidebar{background:rgba(11,17,32,.92);backdrop-filter:blur(24px) saturate(1.2);-webkit-backdrop-filter:blur(24px) saturate(1.2);border-right:1px solid rgba(20,184,166,.1)}
        html:not(.dark) #sidebar{background:rgba(255,255,255,.88);border-right:1px solid rgba(20,184,166,.15)}
        .nav-item{transition:all .2s ease;border-left:3px solid transparent}
        .nav-item:hover{background:rgba(20,184,166,.08)}
        .nav-item.active{background:rgba(20,184,166,.12);color:var(--color-primary,#14B8A6);border-left-color:var(--color-primary,#14B8A6)}
        html:not(.dark) .nav-item{color:#475569}
        html:not(.dark) .nav-item:hover{background:rgba(20,184,166,.06)}
        html:not(.dark) .nav-item.active{background:rgba(20,184,166,.1);color:#0F766E;border-left-color:#0F766E}

        /* ===== 卡片 ===== */
        .admin-card{background:rgba(15,23,42,.55);backdrop-filter:blur(18px) saturate(1.3);-webkit-backdrop-filter:blur(18px) saturate(1.3);border:1px solid rgba(255,255,255,.06);border-radius:20px}
        html:not(.dark) .admin-card{background:rgba(255,255,255,.75);border:1px solid rgba(0,0,0,.06)}

        /* ===== 输入框 ===== */
        .admin-input{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 12px;font-size:.875rem;color:inherit;outline:none;transition:all .2s ease;width:100%}
        .admin-input:focus{border-color:rgba(20,184,166,.4);box-shadow:0 0 0 3px rgba(20,184,166,.1)}
        html:not(.dark) .admin-input{background:#fff;border:1px solid #e2e8f0;color:#0f172a}
        html:not(.dark) .admin-input:focus{border-color:#14B8A6;box-shadow:0 0 0 3px rgba(20,184,166,.15)}
        .admin-input::placeholder{color:rgba(148,163,184,.5)}
        select.admin-input{cursor:pointer}
        textarea.admin-input{resize:vertical}

        /* ===== 按钮 ===== */
        .admin-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:9999px;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s ease;border:none;font-family:inherit;text-decoration:none}
        .admin-btn-primary{background:var(--color-primary,#0D9488);color:#fff;box-shadow:0 4px 16px rgba(20,184,166,.25)}
        .admin-btn-primary:hover{background:var(--color-primary-hover,#0F766E);box-shadow:0 6px 24px rgba(20,184,166,.4);transform:translateY(-1px)}
        .admin-btn-secondary{background:rgba(255,255,255,.06);color:#94a3b8;border:1px solid rgba(255,255,255,.08)}
        .admin-btn-secondary:hover{background:rgba(255,255,255,.1);color:#e2e8f0}
        html:not(.dark) .admin-btn-secondary{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}
        html:not(.dark) .admin-btn-secondary:hover{background:#e2e8f0;color:#0f172a}
        .admin-btn-danger{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
        .admin-btn-danger:hover{background:rgba(239,68,68,.25)}
        .admin-btn-sm{padding:5px 12px;font-size:.75rem}

        /* ===== 标签/徽章 ===== */
        .admin-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:9999px;font-size:.7rem;font-weight:600;letter-spacing:.05em}
        .admin-badge-ok{background:rgba(16,185,129,.15);color:#10B981}
        .admin-badge-warn{background:rgba(245,158,11,.15);color:#F59E0B}
        .admin-badge-err{background:rgba(239,68,68,.15);color:#EF4444}

        /* ===== Toast ===== */
        .admin-toast{display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:14px;background:rgba(15,23,42,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);color:#e2e8f0;font-size:.85rem;box-shadow:0 8px 32px rgba(0,0,0,.3);animation:toastIn .3s ease;pointer-events:auto;min-width:280px}
        html:not(.dark) .admin-toast{background:rgba(255,255,255,.92);color:#0f172a;border:1px solid rgba(0,0,0,.08)}
        .admin-toast.toast-success{border-left:3px solid #10B981}
        .admin-toast.toast-error{border-left:3px solid #EF4444}
        .admin-toast.toast-info{border-left:3px solid #3B82F6}
        .admin-toast.toast-warn{border-left:3px solid #F59E0B}
        @keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
        @keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(20px)}}

        /* ===== 确认对话框 ===== */
        .admin-dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .admin-dialog{background:rgba(15,23,42,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:24px;max-width:400px;width:90%;text-align:center}
        html:not(.dark) .admin-dialog{background:rgba(255,255,255,.92);border:1px solid rgba(0,0,0,.08)}

        /* ===== 列表项 ===== */
        .admin-list-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
        .admin-list-item:hover{background:rgba(20,184,166,.04)}
        html:not(.dark) .admin-list-item{border-bottom:1px solid rgba(0,0,0,.04)}
        html:not(.dark) .admin-list-item:hover{background:rgba(20,184,166,.03)}

        /* ===== 进度条 ===== */
        .admin-progress{width:100%;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
        .admin-progress-bar{height:100%;background:var(--color-primary,#14B8A6);border-radius:2px;transition:width .3s ease}

        /* ===== 表格 ===== */
        .admin-table{width:100%;border-collapse:collapse}
        .admin-table th{padding:10px 16px;text-align:left;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;border-bottom:1px solid rgba(255,255,255,.06)}
        .admin-table td{padding:10px 16px;font-size:.85rem;border-bottom:1px solid rgba(255,255,255,.03)}
        html:not(.dark) .admin-table th{color:#64748b;border-bottom-color:rgba(0,0,0,.06)}
        html:not(.dark) .admin-table td{border-bottom-color:rgba(0,0,0,.03)}

        /* ===== 标签页切换器 ===== */
        .admin-tab-switch{display:flex;padding:3px;background:rgba(255,255,255,.04);border-radius:9999px;gap:2px}
        html:not(.dark) .admin-tab-switch{background:#f1f5f9}
        .admin-tab-btn{padding:6px 16px;border-radius:9999px;font-size:.8rem;font-weight:500;cursor:pointer;border:none;background:transparent;color:#94a3b8;transition:all .2s ease;font-family:inherit}
        .admin-tab-btn.active{background:rgba(20,184,166,.2);color:#5EEAD4}
        html:not(.dark) .admin-tab-btn{color:#64748b}
        html:not(.dark) .admin-tab-btn.active{background:#fff;color:#0F766E;box-shadow:0 1px 3px rgba(0,0,0,.08)}

        /* ===== 滚动条 ===== */
        .admin-scroll::-webkit-scrollbar{width:5px}
        .admin-scroll::-webkit-scrollbar-track{background:transparent}
        .admin-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
        html:not(.dark) .admin-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1)}

        /* ===== 暗/亮模式可见性 ===== */
        .dark .light-only{display:none!important}
        html:not(.dark) .dark-only{display:none!important}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>

    <!-- ═══════════ ADMIN DASHBOARD ═══════════ -->

            <button onclick="toggleSidebar()" class="p-2 -ml-2 rounded-lg" style="color:#94a3b8" aria-label="打开导航菜单" aria-expanded="false" aria-controls="sidebar">

    <div style="display:flex;flex-direction:column;min-height:100vh">
        <!-- ═══════ SIDEBAR + MAIN ═══════ -->
        <div style="display:flex;flex:1">
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col" role="navigation" aria-label="主导航菜单">

                    <i data-lucide="shield" class="w-5 h-5"></i>
                </div>
                <span class="text-lg font-bold tracking-tight" style="color:inherit">ShadowQuake</span>
                <button class="lg:hidden ml-auto" style="color:#94a3b8" onclick="toggleSidebar()" aria-label="关闭导航菜单">

            <!-- Nav -->

                    <button onclick="Dashboard.switchTab('snapshots')" id="nav-snapshots" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium" role="tab" aria-selected="false" aria-controls="view-snapshots" tabindex="-1">
                        <i data-lucide="camera" class="w-4 h-4"></i> 随手拍
                    </button>
                    <button onclick="Dashboard.switchTab('media')" id="nav-media" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium" role="tab" aria-selected="false" aria-controls="view-media" tabindex="-1">

            <div id="toast-container" class="fixed top-6 right-6 z-50 flex flex-col gap-3 pointer-events-none" style="transition:all .3s ease"></div>

            <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">

                                    </div>
                                </div>
                                <div>

                                </div>
                                <div>
                                    <label class="block text-xs font-semibold uppercase tracking-wider mb-1.5" style="color:#94a3b8">描述</label>
                                    <textarea id="bm-desc" class="admin-input" rows="3" placeholder="网站描述..."></textarea>
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold uppercase tracking-wider mb-1.5" style="color:#94a3b8">分类</label>

                                        <input type="file" id="snap-file" accept="image/*" class="admin-input cursor-pointer" aria-label="Upload Image">
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold uppercase tracking-wider mb-1.5" style="color:#94a3b8">位置 & 标签</label>

                                        <input type="text" id="snap-location" class="admin-input" placeholder="位置">
                                        <input type="text" id="snap-tags" class="admin-input" placeholder="标签">

                                </div>

                                <div class="mt-4 flex justify-end">
                                    <button type="submit" class="admin-btn admin-btn-primary">
                                        <i data-lucide="send" class="w-4 h-4"></i> 发布动态
                                    </button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>

                        <button onclick="MediaManager.switchType('manga')" id="tab-manga" class="admin-tab-btn">漫画</button>
                    </div>
                </div>
                <div class="admin-card p-6">

                                <button type="button" onclick="saveBangumiSettings()" class="admin-btn admin-btn-primary admin-btn-sm">保存设置</button>

                <div id="media-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
            </section>

                </div>

                                    <label class="text-sm font-medium mb-1.5 block" style="color:inherit">公告内容</label>

                                            <option value="info">提示</option>
                                            <option value="success">成功</option>
                                            <option value="warning">警告</option>
                                            <option value="error">错误</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="flex justify-end mt-4">
                                <button type="button" id="notice-save" class="admin-btn admin-btn-primary admin-btn-sm">保存公告</button>

                            <button type="submit" class="admin-btn admin-btn-primary">
                                <i data-lucide="save" class="w-4 h-4"></i> 保存设置
                            </button>
                        </div>
                    </form>
                </div>
            </section>

        </main>
        </div><!-- end sidebar+main row -->
